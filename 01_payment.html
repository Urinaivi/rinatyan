<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>支払い管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="payment_style.css">
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title">支払い管理</div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-pill on" id="tabA" onclick="switchTab('A')">自分 (A)</button>
    <div class="tab-arrow" id="arrow">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"
           stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="10" x2="17" y2="10"/>
        <polyline points="12 5 17 10 12 15"/>
      </svg>
    </div>
    <button class="tab-pill off" id="tabB" onclick="switchTab('B')">相手 (B)</button>
  </div>

  <!-- Scroll Area -->
  <div class="scroll" id="scroll"></div>

  <!-- FAB -->
  <button class="fab" onclick="openAdd()">＋</button>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-item" onclick="location.href='index.html'">
      <span class="nav-icon">🏠</span><span class="nav-lbl">ホーム</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">💰</span><span class="nav-lbl">支払い</span>
    </button>
    <button class="nav-item" onclick="location.href='02_wants.html'">
      <span class="nav-icon">📋</span><span class="nav-lbl">やりたい</span>
    </button>
    <button class="nav-item" onclick="location.href='03_stamp.html'">
      <span class="nav-icon">🔖</span><span class="nav-lbl">スタンプ</span>
    </button>
  </nav>

  <!-- ── 追加モーダル ── -->
  <div class="overlay" id="addModal" onclick="bgClose(event,'addModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr">
        <span class="sh-title">支払いを追加</span>
        <button class="x-btn" onclick="close('addModal')">✕</button>
      </div>

      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">発生日時</span>
          <input class="f-inp" type="datetime-local" id="f-date"/>
        </div>
        <div class="f-row">
          <span class="f-lbl">金額</span>
          <input class="f-inp" type="number" id="f-amount" placeholder="0" min="1"/>
          <span style="font-size:14px;color:var(--sub);flex-shrink:0">円</span>
        </div>
        <div class="f-row">
          <span class="f-lbl">メモ</span>
          <input class="f-inp" type="text" id="f-memo" placeholder="任意"/>
        </div>
      </div>

      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">支払者</span>
          <div class="tgl-g">
            <button class="tgl tgl-accent" id="t-a" onclick="setWho('A')">自分 (A)</button>
            <button class="tgl tgl-off"    id="t-b" onclick="setWho('B')">相手 (B)</button>
          </div>
        </div>
        <div class="f-row">
          <span class="f-lbl">ステータス</span>
          <div class="tgl-g">
            <button class="tgl tgl-red"   id="t-unpaid" onclick="setStatus('unpaid')">未支払い</button>
            <button class="tgl tgl-off"   id="t-paid"   onclick="setStatus('paid')">支払済み</button>
          </div>
        </div>
        <div class="f-row" id="paidDateRow" style="display:none">
          <span class="f-lbl">支払日時</span>
          <input class="f-inp" type="datetime-local" id="f-paiddate"/>
        </div>
      </div>

      <button class="ok-btn" id="addBtn" onclick="submitAdd()">追加する</button>
    </div>
  </div>

  <!-- ── 詳細モーダル ── -->
  <div class="overlay" id="detModal" onclick="bgClose(event,'detModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr">
        <span class="sh-title">支払い詳細</span>
        <button class="x-btn" onclick="close('detModal')">✕</button>
      </div>
      <div id="detBody"></div>
      <button class="del-btn" id="delBtn">🗑 この支払いを削除する</button>
    </div>
  </div>

</div><!-- /phone -->

<script>
/* ──────────── STATE ──────────── */
const STORE = 'pay_v1';

// ストレージから読み込み。なければサンプルデータ
let payments = (() => {
  try { return JSON.parse(localStorage.getItem(STORE)) || null; } catch { return null; }
})() || [
  { id: uid(), date: '2026-04-06T14:00', amount: 800,  memo: 'ランチ',   who: 'A', status: 'unpaid', paidDate: null,            createdAt: '2026-04-06T14:00' },
  { id: uid(), date: '2026-04-05T16:00', amount: 1200, memo: 'カフェ',   who: 'A', status: 'unpaid', paidDate: null,            createdAt: '2026-04-05T16:00' },
  { id: uid(), date: '2026-04-01T01:00', amount: 100,  memo: 'コンビニ', who: 'A', status: 'paid',   paidDate: '2026-04-02T10:00', createdAt: '2026-04-01T01:00' },
  { id: uid(), date: '2026-04-04T12:00', amount: 1000, memo: '夕食',     who: 'B', status: 'unpaid', paidDate: null,            createdAt: '2026-04-04T12:00' },
  { id: uid(), date: '2026-03-30T09:00', amount: 500,  memo: '交通費',   who: 'B', status: 'paid',   paidDate: '2026-04-01T09:00', createdAt: '2026-03-30T09:00' },
];

let tab    = 'A';     // 表示中タブ
let fWho   = 'A';     // フォーム: 支払者
let fStatus = 'unpaid'; // フォーム: ステータス

/* ──────────── UTILS ──────────── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function yen(n) { return '¥' + Number(n).toLocaleString(); }
function nowISO() { const d = new Date(); d.setSeconds(0,0); return d.toISOString().slice(0,16); }

function fmtDateTime(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// 発生日時から3ヶ月以上経過したデータを自動削除
function autoDelete() {
  const limit = 3 * 30 * 24 * 60 * 60 * 1000; // 3ヶ月（ms）
  const now = Date.now();
  const before = payments.length;
  payments = payments.filter(p => now - new Date(p.date).getTime() < limit);
  if (payments.length !== before) persist();
}

function persist() {
  localStorage.setItem(STORE, JSON.stringify(payments));
}

/* ──────────── TAB ──────────── */
function switchTab(t, anim) {
  if (t === tab && !anim) return;
  const dir = anim || (t === 'B' ? 'anim-r' : 'anim-l');
  tab = t;
  document.getElementById('tabA').className = 'tab-pill ' + (t === 'A' ? 'on' : 'off');
  document.getElementById('tabB').className = 'tab-pill ' + (t === 'B' ? 'on' : 'off');
  document.getElementById('arrow').style.transform = t === 'B' ? 'scaleX(-1)' : 'scaleX(1)';
  render(dir);
}

/* ──────────── RENDER ──────────── */
function render(anim) {
  const el = document.getElementById('scroll');

  const mine  = payments.filter(p => p.who === tab);
  const other = payments.filter(p => p.who !== tab);

  const unpaid = mine.filter(p => p.status === 'unpaid')
                     .sort((a,b) => b.date.localeCompare(a.date));
  const paid   = mine.filter(p => p.status === 'paid')
                     .sort((a,b) => b.date.localeCompare(a.date));

  const unpaidTotal = unpaid.reduce((s,p) => s + p.amount, 0);
  const otherUnpaid = other.filter(p => p.status === 'unpaid')
                           .reduce((s,p) => s + p.amount, 0);
  const diff      = otherUnpaid - unpaidTotal;
  const diffStr   = (diff >= 0 ? '＋' : '－') + yen(Math.abs(diff));
  const diffClass = diff >= 0 ? 'pos' : 'neg';

  const rowHTML = p => `
    <div class="c-row" onclick="openDetail('${p.id}')">
      <div class="c-main">
        <div class="c-date">${fmtDateTime(p.date)}</div>
        ${p.memo ? `<div class="c-memo">${p.memo}</div>` : ''}
      </div>
      <div class="c-right">
        <div class="c-amount">${yen(p.amount)}</div>
        <span class="badge ${p.status === 'paid' ? 'b-green' : 'b-red'}">${p.status === 'paid' ? '支払済' : '未支払'}</span>
      </div>
    </div>`;

  el.innerHTML = `
    <div class="sec-lbl">未支払い</div>
    <div class="c-list">${unpaid.length ? unpaid.map(rowHTML).join('') : '<div class="empty-row">データなし</div>'}</div>

    <div class="sec-lbl">支払い済み</div>
    <div class="c-list">${paid.length ? paid.map(rowHTML).join('') : '<div class="empty-row">データなし</div>'}</div>

    <div class="sec-lbl">合計</div>
    <div class="sum-card">
      <div class="sum-row">
        <span class="sum-lbl">未支払合計</span>
        <span class="sum-val">${yen(unpaidTotal)}</span>
      </div>
      <div class="sum-row">
        <span class="sum-lbl">相手との差額</span>
        <span class="sum-val ${diffClass}">${diffStr}</span>
      </div>
    </div>
    <div style="height:6px"></div>
  `;

  if (anim) {
    el.classList.remove('anim-r','anim-l');
    void el.offsetWidth; // reflow
    el.classList.add(anim);
  }
}

/* ──────────── MODAL HELPERS ──────────── */
function open(id)  { document.getElementById(id).classList.add('open'); }
function close(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) close(id); }

/* ──────────── ADD MODAL ──────────── */
function openAdd() {
  document.getElementById('f-date').value    = nowISO();
  document.getElementById('f-amount').value  = '';
  document.getElementById('f-memo').value    = '';
  document.getElementById('f-paiddate').value = nowISO();
  setWho(tab);
  setStatus('unpaid');
  open('addModal');
}

function setWho(w) {
  fWho = w;
  document.getElementById('t-a').className = 'tgl ' + (w === 'A' ? 'tgl-accent' : 'tgl-off');
  document.getElementById('t-b').className = 'tgl ' + (w === 'B' ? 'tgl-accent' : 'tgl-off');
}

function setStatus(s) {
  fStatus = s;
  document.getElementById('t-unpaid').className = 'tgl ' + (s === 'unpaid' ? 'tgl-red'   : 'tgl-off');
  document.getElementById('t-paid'  ).className = 'tgl ' + (s === 'paid'   ? 'tgl-green' : 'tgl-off');
  document.getElementById('paidDateRow').style.display = s === 'paid' ? 'flex' : 'none';
}

function submitAdd() {
  const date   = document.getElementById('f-date').value;
  const amount = parseInt(document.getElementById('f-amount').value, 10);
  const memo   = document.getElementById('f-memo').value.trim();

  if (!date || isNaN(amount) || amount < 1) {
    alert('発生日時と金額（1円以上）を入力してください');
    return;
  }

  const paidDate = fStatus === 'paid'
    ? (document.getElementById('f-paiddate').value || date)
    : null;

  payments.push({
    id: uid(), date, amount, memo,
    who: fWho, status: fStatus,
    paidDate, createdAt: new Date().toISOString()
  });

  payments.sort((a,b) => b.date.localeCompare(a.date));
  persist();
  close('addModal');
  render();
}

/* ──────────── DETAIL MODAL ──────────── */
function openDetail(id) {
  const p = payments.find(x => x.id === id);
  if (!p) return;

  document.getElementById('detBody').innerHTML = `
    <div class="det-title">${yen(p.amount)}</div>
    <div class="det-row"><span class="det-k">ステータス</span>  <span class="det-v">${p.status === 'paid' ? '✅ 支払済み' : '⏳ 未支払い'}</span></div>
    <div class="det-row"><span class="det-k">支払者</span>      <span class="det-v">${p.who === 'A' ? '自分 (A)' : '相手 (B)'}</span></div>
    <div class="det-row"><span class="det-k">発生日時</span>    <span class="det-v">${fmtDateTime(p.date)}</span></div>
    ${p.paidDate ? `<div class="det-row"><span class="det-k">支払日時</span><span class="det-v">${fmtDateTime(p.paidDate)}</span></div>` : ''}
    ${p.memo     ? `<div class="det-row"><span class="det-k">メモ</span>    <span class="det-v">${p.memo}</span></div>` : ''}
    <div class="det-row"><span class="det-k">登録日時</span>    <span class="det-v">${fmtDateTime(p.createdAt)}</span></div>
  `;

  // ステータストグルボタン
  const toggleLabel = p.status === 'unpaid' ? '✅ 支払済みにする' : '↩ 未支払いに戻す';
  const toggleColor = p.status === 'unpaid' ? 'var(--green)' : 'var(--accent)';
  let extra = document.createElement('button');
  extra.className = 'ok-btn';
  extra.style.cssText = `background:${toggleColor};margin-bottom:0`;
  extra.textContent = toggleLabel;
  extra.onclick = () => {
    p.status   = p.status === 'unpaid' ? 'paid' : 'unpaid';
    p.paidDate = p.status === 'paid' ? new Date().toISOString() : null;
    persist();
    close('detModal');
    render();
  };
  document.getElementById('detBody').appendChild(extra);

  document.getElementById('delBtn').onclick = () => {
    if (!confirm('この支払いを削除しますか？')) return;
    payments = payments.filter(x => x.id !== id);
    persist();
    close('detModal');
    render();
  };

  open('detModal');
}

/* ──────────── INIT ──────────── */
autoDelete();
render();
</script>
</body>
</html>
