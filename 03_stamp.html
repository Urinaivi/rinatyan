<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>スタンプカード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="wants_style.css">
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title">スタンプカード</div>
    <div class="hdr-acts">
      <button class="hdr-btn" id="newCardBtn" onclick="openNewCardModal()" title="新しいカードを手動作成">＋</button>
    </div>
  </div>

  <!-- Scroll -->
  <div class="scroll" id="scroll"></div>

  <!-- FAB: スタンプを押す -->
  <button class="fab" id="stampFab" onclick="pressStamp()" title="今日のスタンプを押す">🔖</button>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-item" onclick="location.href='index.html'">
      <span class="nav-icon">🏠</span><span class="nav-lbl">ホーム</span>
    </button>
    <button class="nav-item" onclick="location.href='01_payment.html'">
      <span class="nav-icon">💰</span><span class="nav-lbl">支払い</span>
    </button>
    <button class="nav-item" onclick="location.href='02_wants.html'">
      <span class="nav-icon">📋</span><span class="nav-lbl">やりたい</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">🔖</span><span class="nav-lbl">スタンプ</span>
    </button>
  </nav>

  <!-- ── 報酬編集モーダル ── -->
  <div class="overlay" id="rewardModal" onclick="bgClose(event,'rewardModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr">
        <span class="sh-title">コンプリート報酬を編集</span>
        <button class="x-btn" onclick="close('rewardModal')">✕</button>
      </div>
      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">報酬内容</span>
          <textarea class="f-inp" id="rewardInput" rows="3" placeholder="例：好きなレストランへのディナー 🍽️"></textarea>
        </div>
      </div>
      <button class="ok-btn" onclick="saveReward()">保存する</button>
    </div>
  </div>

  <!-- ── スタンプ詳細モーダル ── -->
  <div class="overlay" id="stampDetModal" onclick="bgClose(event,'stampDetModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr">
        <span class="sh-title">スタンプ詳細</span>
        <button class="x-btn" onclick="close('stampDetModal')">✕</button>
      </div>
      <div id="stampDetBody"></div>
    </div>
  </div>

  <!-- ── 新しいカード作成モーダル ── -->
  <div class="overlay" id="newCardModal" onclick="bgClose(event,'newCardModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr">
        <span class="sh-title">新しいスタンプカード</span>
        <button class="x-btn" onclick="close('newCardModal')">✕</button>
      </div>
      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">カード名</span>
          <textarea class="f-inp" id="newCardTitle" rows="1" placeholder="例：2026年 夏のスタンプカード"></textarea>
        </div>
        <div class="f-row">
          <span class="f-lbl">目標</span>
          <textarea class="f-inp" id="newCardGoal" rows="2" placeholder="例：12:00までにお風呂に入る"></textarea>
        </div>
      </div>
      <button class="ok-btn" onclick="createNewCard()">作成する</button>
    </div>
  </div>

</div>

<script>
/* ─── STATE ─── */
const STORE        = 'stamp_v1';
const REWARD_STORE = 'stamp_reward_v1';

// カード構造: { id, title, goal, startDate, cells:[30 bools], stampDates:[30 ISO|null], completed, completedDate }
let data   = loadData();
let reward = localStorage.getItem(REWARD_STORE) || '互いに好きな報酬を決める 🎁';
let cardIdx = data.cards.length - 1; // 最新カードを表示

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE));
    if (d && Array.isArray(d.cards) && d.cards.length) return d;
  } catch {}
  return { cards: [createCard('最初のスタンプカード', '毎日の目標をここに入力')] };
}

/* ─── UTILS ─── */
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDateTime(s) {
  if (!s) return '—';
  const d = new Date(s); if (isNaN(d)) return s;
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtDay(s) {
  if (!s) return '—';
  const d = new Date(s); if (isNaN(d)) return s;
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}`;
}
function persist() { localStorage.setItem(STORE, JSON.stringify(data)); }

function createCard(title, goal) {
  return {
    id: uid(), title, goal,
    startDate: new Date().toISOString(),
    cells: Array(30).fill(false),
    stampDates: Array(30).fill(null),
    completed: false,
    completedDate: null,
  };
}

/* 今日すでにスタンプ済みか（00:01〜24:00） */
function stampedToday(card) {
  return card.stampDates.some(d => d && d.startsWith(todayStr()));
}

/* ─── RENDER ─── */
function render() {
  const el = document.getElementById('scroll');
  const cards = data.cards;
  if (!cards.length) { el.innerHTML = '<div style="text-align:center;padding:48px 24px;color:var(--muted)">カードがありません</div>'; return; }

  // 表示カードを最新に補正
  if (cardIdx >= cards.length) cardIdx = cards.length - 1;
  if (cardIdx < 0) cardIdx = 0;

  const card     = cards[cardIdx];
  const stamped  = card.cells.filter(Boolean).length;
  const pct      = Math.round(stamped / 30 * 100);
  const todayOk  = stampedToday(card);
  const isLatest = cardIdx === cards.length - 1;

  // FAB制御: 最新かつ未完了かつ今日未スタンプのときのみ有効
  const fab = document.getElementById('stampFab');
  if (!isLatest || card.completed || todayOk) {
    fab.disabled = true;
    fab.style.background = '#d1d1d6';
    fab.style.boxShadow  = '0 4px 12px rgba(0,0,0,.12)';
  } else {
    fab.disabled = false;
    fab.style.background = 'var(--pink)';
    fab.style.boxShadow  = '0 4px 18px rgba(255,45,85,.45)';
  }

  // ステータスバッジ
  let badgeHTML = '';
  if (card.completed) {
    badgeHTML = `<div class="today-badge done">✨ コンプリート済み</div>`;
  } else if (todayOk) {
    badgeHTML = `<div class="today-badge ok">✅ 今日のスタンプ完了</div>`;
  } else if (isLatest) {
    badgeHTML = `<div class="today-badge wait">⏳ 今日のスタンプがまだです</div>`;
  }

  // スタンプグリッド
  const gridCells = card.cells.map((s, i) => {
    const cls = s ? 'stamp-cell stamped' : 'stamp-cell empty';
    return `<div class="${cls}" id="cell-${i}" onclick="cellTap(${i})"></div>`;
  }).join('');

  // 完了バナー
  const completeBanner = card.completed ? `
    <div class="complete-banner">
      <div class="complete-banner-title">🎉 コンプリート！</div>
      <div class="complete-banner-sub">${fmtDay(card.completedDate)} 達成</div>
    </div>` : '';

  el.innerHTML = `
    ${badgeHTML}

    <div class="card-nav">
      <button class="nav-arrow" id="prevBtn" onclick="moveCard(-1)" ${cardIdx===0?'disabled':''}>‹</button>
      <span class="card-nav-label">${cardIdx+1} / ${cards.length}</span>
      <button class="nav-arrow" id="nextBtn" onclick="moveCard(1)" ${cardIdx===cards.length-1?'disabled':''}>›</button>
    </div>

    <div class="stamp-card ${card.completed?'completed':''} fade-in">
      <div class="sc-header">
        <div class="sc-title">${card.title}</div>
        <div class="sc-period">開始: ${fmtDay(card.startDate)}</div>
        <div class="sc-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${stamped}/30</span>
        </div>
      </div>
      <div class="stamp-grid">${gridCells}</div>
      ${completeBanner}
    </div>

    <div class="goal-card">
      <div class="goal-label">スタンプ目標</div>
      <div class="goal-text" id="goalText">${card.goal || '目標を設定しましょう'}</div>
      ${isLatest && !card.completed ? `
        <div class="goal-edit-row">
          <input class="goal-input" id="goalInput" value="${card.goal||''}" placeholder="目標を入力..."/>
          <button class="goal-save-btn" onclick="saveGoal()">保存</button>
        </div>` : ''}
    </div>

    <div class="reward-card">
      <div class="reward-header">
        <span class="reward-label">コンプリート報酬について</span>
        <button class="reward-edit-btn" onclick="openRewardModal()">✏️ 編集</button>
      </div>
      <div class="reward-text">${reward}</div>
    </div>

    <div style="height:6px"></div>
  `;
}

/* ─── CARD NAV ─── */
function moveCard(dir) {
  cardIdx = Math.max(0, Math.min(data.cards.length - 1, cardIdx + dir));
  render();
}

/* ─── STAMP ─── */
function pressStamp() {
  const card = data.cards[cardIdx];
  if (!card || card.completed) return;
  if (stampedToday(card)) { alert('今日はすでにスタンプ済みです (00:01〜24:00)'); return; }

  const nextIdx = card.cells.findIndex(c => !c);
  if (nextIdx === -1) return;

  card.cells[nextIdx]      = true;
  card.stampDates[nextIdx] = new Date().toISOString();

  // アニメーション
  setTimeout(() => {
    const cell = document.getElementById(`cell-${nextIdx}`);
    if (cell) { cell.classList.add('stamped'); cell.classList.remove('empty'); cell.classList.add('stamp-pop'); }
  }, 10);

  const stamped = card.cells.filter(Boolean).length;

  if (stamped === 30) {
    card.completed     = true;
    card.completedDate = new Date().toISOString();
    persist();
    setTimeout(() => {
      alert('🎉 おめでとう！スタンプカードをコンプリートしました！\n報酬をゲット！');
      autoCreateNextCard();
      cardIdx = data.cards.length - 1;
      render();
    }, 400);
    return;
  }

  persist();
  render();
}

/* コンプリート後、次のカードを自動生成 */
function autoCreateNextCard() {
  const newCard = createCard(
    `スタンプカード ${data.cards.length + 1}`,
    data.cards[data.cards.length - 1].goal || '毎日の目標'
  );
  data.cards.push(newCard);
  persist();
}

/* ─── CELL TAP (詳細) ─── */
function cellTap(idx) {
  const card = data.cards[cardIdx];
  if (!card.cells[idx]) return; // 空マスは何もしない
  const d = card.stampDates[idx];
  document.getElementById('stampDetBody').innerHTML = `
    <div class="det-row"><span class="det-k">スタンプ番号</span><span class="det-v">${idx + 1}番目</span></div>
    <div class="det-row"><span class="det-k">押した日時</span><span class="det-v">${fmtDateTime(d)}</span></div>
  `;
  open('stampDetModal');
}

/* ─── GOAL ─── */
function saveGoal() {
  const val = (document.getElementById('goalInput')?.value || '').trim();
  if (!val) { alert('目標を入力してください'); return; }
  data.cards[cardIdx].goal = val;
  persist();
  render();
}

/* ─── REWARD ─── */
function openRewardModal() {
  document.getElementById('rewardInput').value = reward;
  open('rewardModal');
}
function saveReward() {
  reward = document.getElementById('rewardInput').value.trim() || '報酬未設定';
  localStorage.setItem(REWARD_STORE, reward);
  close('rewardModal');
  render();
}

/* ─── NEW CARD ─── */
function openNewCardModal() {
  document.getElementById('newCardTitle').value = `スタンプカード ${data.cards.length + 1}`;
  document.getElementById('newCardGoal').value  = data.cards[data.cards.length-1]?.goal || '';
  open('newCardModal');
}
function createNewCard() {
  const title = document.getElementById('newCardTitle').value.trim();
  const goal  = document.getElementById('newCardGoal').value.trim();
  if (!title) { alert('カード名を入力してください'); return; }
  data.cards.push(createCard(title, goal));
  persist();
  cardIdx = data.cards.length - 1;
  close('newCardModal');
  render();
}

/* ─── MODAL HELPERS ─── */
function open(id)  { document.getElementById(id).classList.add('open'); }
function close(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) close(id); }

/* ─── INIT ─── */
render();
</script>
</body>
</html>
