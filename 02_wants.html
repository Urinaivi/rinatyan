<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>やりたいことリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="icon" href="photo/favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#6b7280;--muted:#aeaeb2;--border:rgba(0,0,0,0.07);--accent:#7c7aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--r:14px;--nav:62px}
html,body{height:100%;background:#c9c9ce;display:flex;justify-content:center;align-items:center;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.phone{width:min(390px,100vw);height:min(844px,100dvh);background:var(--bg);border-radius:clamp(0px,calc((100vw - 390px)*-99),48px);overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 80px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.09)}
.hdr{padding:max(52px,env(safe-area-inset-top,52px)) 20px 10px;background:var(--bg);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.hdr-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.hdr-acts{display:flex;gap:6px}
.hdr-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:none;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--sub);transition:background .15s}
.hdr-btn:active{background:var(--border)}
.search-wrap{padding:4px 14px 10px;flex-shrink:0}
.search-box{background:var(--card);border-radius:12px;display:flex;align-items:center;gap:8px;padding:10px 14px}
.search-box input{flex:1;border:none;outline:none;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:transparent}
.search-box input::placeholder{color:var(--muted)}
.scroll{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}

/* ─ Charts ─ */
.chart-row{display:flex;gap:8px;margin-bottom:8px}
.chart-box{flex:1;background:var(--card);border-radius:var(--r);padding:14px 10px;display:flex;flex-direction:column;align-items:center}
.chart-lbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;margin-bottom:8px;text-align:center}
.chart-sub{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
.pie-wrap{position:relative;width:76px;height:76px}
.pie-wrap canvas{width:76px!important;height:76px!important}
.pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.pie-num{font-size:16px;font-weight:700;color:var(--text)}
.pie-unit{font-size:10px;color:var(--sub)}

/* ─ List ─ */
.sec-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.07em;text-transform:uppercase;padding:14px 2px 6px}
.c-list{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:6px}
.c-row{display:flex;align-items:stretch;border-bottom:.5px solid var(--border);cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;overflow:hidden}
.c-row:last-child{border-bottom:none}
.c-row:active{background:#f5f5fa}

/* サムネイル */
.c-thumb{width:64px;flex-shrink:0;background:#f0f0f5;overflow:hidden}
.c-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.c-thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted)}

.c-body{flex:1;min-width:0;padding:12px 14px 12px 12px;display:flex;align-items:center;gap:10px}
.c-main{flex:1;min-width:0}
.c-title{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:12px;color:var(--sub);margin-top:2px}
.c-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.c-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--bg);color:var(--sub)}
.c-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.c-desire{display:flex;gap:1px}
.c-desire-dot{width:8px;height:8px;border-radius:50%}
.c-cost{font-size:11px;font-weight:600;color:var(--sub)}
.c-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block}
.b-orange{background:#fff3e0;color:var(--orange)}
.b-green{background:#e3f9eb;color:var(--green)}
.empty-row{padding:24px;text-align:center;font-size:14px;color:var(--muted)}

/* ─ FAB ─ */
.fab{position:absolute;bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px) + 18px);right:18px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(124,122,255,.5);transition:transform .15s;z-index:20}
.fab:active{transform:scale(.91)}

/* ─ Nav ─ */
.nav{height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(250,250,250,.96);border-top:.5px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0;backdrop-filter:blur(20px);z-index:30}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:10px 0 6px;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.nav-item:active{transform:scale(.88)}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--accent);font-weight:700}

/* ─ Overlay / Sheet ─ */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.42);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--bg);border-radius:24px 24px 0 0;transform:translateY(100%);max-height:94%;overflow-y:auto;transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 10px}
.sh-title{font-size:17px;font-weight:700;color:var(--text)}
.x-btn{width:28px;height:28px;border-radius:50%;background:#e4e4e9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--sub)}

/* ─ Form ─ */
.f-card{background:var(--card);border-radius:var(--r);margin:0 14px 10px;overflow:hidden}
.f-sec{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;padding:10px 16px 4px}
.f-row{display:flex;align-items:flex-start;padding:13px 16px;border-bottom:.5px solid var(--border);gap:10px}
.f-row:last-child{border-bottom:none}
.f-lbl{font-size:15px;color:var(--text);min-width:86px;flex-shrink:0;padding-top:2px}
.f-lbl-sm{font-size:13px;color:var(--sub);min-width:72px;flex-shrink:0;padding-top:3px}
.f-inp{flex:1;border:none;outline:none;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:transparent;text-align:right}
.f-inp::placeholder{color:#c7c7cc}
.f-inp.left{text-align:left}
input[type=date]{color-scheme:light}
textarea.f-inp{text-align:left;resize:none;line-height:1.6;padding:2px 0}

/* desire stars */
.desire-row{display:flex;gap:4px;margin-left:auto}
.d-star{font-size:24px;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.d-star:active{transform:scale(.85)}

/* cost buttons */
.cost-g{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.cost-btn{padding:6px 10px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.cost-off{background:#e4e4e9;color:var(--sub)}
.cost-on{background:var(--accent);color:#fff}

/* tag input */
.tag-input-wrap{flex:1;display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:28px}
.tag-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:var(--accent);color:#fff;font-size:12px;font-weight:600}
.tag-chip-del{font-size:11px;cursor:pointer;opacity:.7}
.tag-chip-del:hover{opacity:1}
.tag-bare{border:none;outline:none;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:transparent;min-width:60px;flex:1}
.tag-bare::placeholder{color:#c7c7cc}

/* image preview */
.img-preview{width:100%;border-radius:10px;overflow:hidden;margin:0 16px 10px;width:calc(100% - 28px)}
.img-preview img{width:100%;max-height:200px;object-fit:cover;display:block;border-radius:10px}
.img-upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;border:1.5px dashed var(--muted);border-radius:10px;background:transparent;cursor:pointer;font-size:14px;color:var(--sub);font-family:'Noto Sans JP',sans-serif;transition:border-color .15s}
.img-upload-btn:active{border-color:var(--accent);color:var(--accent)}
.img-remove{display:block;text-align:center;font-size:13px;color:var(--red);cursor:pointer;padding:6px 0;font-weight:600}

/* map link */
.map-link{color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
.map-link:active{opacity:.7}

/* ok/del buttons */
.tgl-g{display:flex;gap:6px;margin-left:auto}
.tgl{padding:7px 12px;border-radius:11px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;cursor:pointer;transition:background .16s,color .16s}
.tgl-off{background:#e4e4e9;color:var(--sub)}
.tgl-accent{background:var(--accent);color:#fff}
.tgl-green{background:var(--green);color:#fff}
.tgl-orange{background:var(--orange);color:#fff}
.ok-btn{display:block;width:calc(100% - 28px);margin:2px 14px 22px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.04em;transition:opacity .15s,transform .12s}
.ok-btn:active{opacity:.82;transform:scale(.98)}
.ok-btn.green{background:var(--green)}
.ok-btn.orange{background:var(--orange)}
.del-btn{display:block;width:calc(100% - 28px);margin:4px 14px 22px;padding:13px;background:#ffe5e4;color:var(--red);border:none;border-radius:var(--r);font-size:15px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer}

/* detail */
.det-hero{width:100%;max-height:180px;object-fit:cover;display:block}
.det-title{font-size:20px;font-weight:700;color:var(--text);padding:12px 16px 8px;line-height:1.4}
.det-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 16px 10px}
.det-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:#eef0fe;color:var(--accent)}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 16px;border-bottom:.5px solid var(--border);font-size:14px;gap:12px}
.det-row:last-child{border-bottom:none}
.det-k{color:var(--sub);flex-shrink:0}
.det-v{color:var(--text);font-weight:500;text-align:right;word-break:break-all;max-width:230px}
.det-v a{color:var(--accent);text-decoration:none}
.det-desire{display:flex;gap:2px}

/* filter */
.filter-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:.5px solid var(--border)}
.filter-row:last-child{border-bottom:none}
.filter-lbl{font-size:14px;color:var(--text)}
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="hdr-title">やりたいことリスト</div>
    <div class="hdr-acts">
      <button class="hdr-btn" onclick="openFilter()">⚙️</button>
      <button class="hdr-btn" onclick="location.href='04_bingo.html'">⬛</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span style="font-size:16px;color:var(--muted)">🔍</span>
      <input id="searchInput" placeholder="検索..." oninput="render()"/>
    </div>
  </div>
  <div class="scroll" id="scroll"></div>
  <button class="fab" onclick="openAdd()">＋</button>
  <nav class="nav" id="nav"></nav>

  <!-- ═══ 追加モーダル ═══ -->
  <div class="overlay" id="addModal" onclick="bgClose(event,'addModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">やりたいことを追加</span><button class="x-btn" onclick="closeM('addModal')">✕</button></div>

      <!-- 画像 -->
      <div style="padding:0 14px 4px">
        <div id="addImgPreview" style="display:none;margin-bottom:8px">
          <img id="addImgEl" src="" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;display:block"/>
          <span class="img-remove" onclick="removeAddImg()">✕ 画像を削除</span>
        </div>
        <label class="img-upload-btn">
          📷 画像を追加
          <input type="file" accept="image/*" id="addImgInput" style="display:none" onchange="onAddImg(this)"/>
        </label>
      </div>

      <div class="f-card">
        <div class="f-row"><span class="f-lbl">タイトル</span><input class="f-inp" type="text" id="f-title" placeholder="例：花畑へ行く"/></div>
        <div class="f-row">
          <span class="f-lbl">タグ</span>
          <div class="tag-input-wrap" id="addTagWrap">
            <input class="tag-bare" id="addTagInput" placeholder="タグを入力してEnter" onkeydown="handleTagKey(event,'add')"/>
          </div>
        </div>
        <div class="f-row"><span class="f-lbl">イベント期間</span><input class="f-inp" type="text" id="f-period" placeholder="例：2026/4/1〜4/30"/></div>
        <div class="f-row"><span class="f-lbl">URL</span><input class="f-inp" type="url" id="f-url" placeholder="https://..."/></div>
        <div class="f-row"><span class="f-lbl">マップURL</span><input class="f-inp" type="url" id="f-map" placeholder="Google Maps URL..."/></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">メモ</span><textarea class="f-inp left" id="f-memo" rows="2" placeholder="任意"></textarea></div>
      </div>

      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">やりたい度</span>
          <div class="desire-row" id="addDesireRow">
            <span class="d-star" onclick="setDesire('add',1)">🤍</span>
            <span class="d-star" onclick="setDesire('add',2)">🤍</span>
            <span class="d-star" onclick="setDesire('add',3)">🤍</span>
            <span class="d-star" onclick="setDesire('add',4)">🤍</span>
            <span class="d-star" onclick="setDesire('add',5)">🤍</span>
          </div>
        </div>
        <div class="f-row">
          <span class="f-lbl">行動コスト</span>
          <div class="cost-g" id="addCostBtns">
            <button class="cost-btn cost-off" onclick="setCost('add','free')">無料</button>
            <button class="cost-btn cost-off" onclick="setCost('add','low')">〜¥3k</button>
            <button class="cost-btn cost-off" onclick="setCost('add','mid')">〜¥1万</button>
            <button class="cost-btn cost-off" onclick="setCost('add','high')">¥1万〜</button>
          </div>
        </div>
        <div class="f-row"><span class="f-lbl">登録者</span><span id="addRegLabel" style="font-size:14px;color:var(--sub);margin-left:auto"></span></div>
        <div class="f-row"><span class="f-lbl">ステータス</span><div class="tgl-g"><button class="tgl tgl-orange" id="t-pending" onclick="setAddStatus('pending')">未実行</button><button class="tgl tgl-off" id="t-done" onclick="setAddStatus('done')">実行済み</button></div></div>
        <div class="f-row" id="doneDateRow" style="display:none"><span class="f-lbl">実行日</span><input class="f-inp" type="date" id="f-donedate"/></div>
      </div>
      <button class="ok-btn" onclick="submitAdd()">追加する</button>
    </div>
  </div>

  <!-- ═══ 詳細モーダル ═══ -->
  <div class="overlay" id="detModal" onclick="bgClose(event,'detModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">詳細</span><button class="x-btn" onclick="closeM('detModal')">✕</button></div>
      <div id="detBody"></div>
      <button class="ok-btn" id="editBtn" style="background:var(--accent);margin-bottom:6px" onclick="openEdit()">✏️ 編集する</button>
      <button class="ok-btn green" id="toggleBtn">✅ 実行済みにする</button>
      <button class="del-btn" id="delBtn">🗑 削除する</button>
    </div>
  </div>

  <!-- ═══ 編集モーダル ═══ -->
  <div class="overlay" id="editModal" onclick="bgClose(event,'editModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">編集</span><button class="x-btn" onclick="closeM('editModal')">✕</button></div>

      <div style="padding:0 14px 4px">
        <div id="editImgPreview" style="display:none;margin-bottom:8px">
          <img id="editImgEl" src="" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;display:block"/>
          <span class="img-remove" onclick="removeEditImg()">✕ 画像を削除</span>
        </div>
        <label class="img-upload-btn">
          📷 画像を変更
          <input type="file" accept="image/*" id="editImgInput" style="display:none" onchange="onEditImg(this)"/>
        </label>
      </div>

      <div class="f-card">
        <div class="f-row"><span class="f-lbl">タイトル</span><input class="f-inp" type="text" id="e-title"/></div>
        <div class="f-row">
          <span class="f-lbl">タグ</span>
          <div class="tag-input-wrap" id="editTagWrap">
            <input class="tag-bare" id="editTagInput" placeholder="タグを入力してEnter" onkeydown="handleTagKey(event,'edit')"/>
          </div>
        </div>
        <div class="f-row"><span class="f-lbl">イベント期間</span><input class="f-inp" type="text" id="e-period" placeholder="例：2026/4/1〜4/30"/></div>
        <div class="f-row"><span class="f-lbl">URL</span><input class="f-inp" type="url" id="e-url" placeholder="https://..."/></div>
        <div class="f-row"><span class="f-lbl">マップURL</span><input class="f-inp" type="url" id="e-map" placeholder="Google Maps URL..."/></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">メモ</span><textarea class="f-inp left" id="e-memo" rows="2"></textarea></div>
      </div>

      <div class="f-card">
        <div class="f-row">
          <span class="f-lbl">やりたい度</span>
          <div class="desire-row" id="editDesireRow">
            <span class="d-star" onclick="setDesire('edit',1)">🤍</span>
            <span class="d-star" onclick="setDesire('edit',2)">🤍</span>
            <span class="d-star" onclick="setDesire('edit',3)">🤍</span>
            <span class="d-star" onclick="setDesire('edit',4)">🤍</span>
            <span class="d-star" onclick="setDesire('edit',5)">🤍</span>
          </div>
        </div>
        <div class="f-row">
          <span class="f-lbl">行動コスト</span>
          <div class="cost-g" id="editCostBtns">
            <button class="cost-btn cost-off" onclick="setCost('edit','free')">無料</button>
            <button class="cost-btn cost-off" onclick="setCost('edit','low')">〜¥3k</button>
            <button class="cost-btn cost-off" onclick="setCost('edit','mid')">〜¥1万</button>
            <button class="cost-btn cost-off" onclick="setCost('edit','high')">¥1万〜</button>
          </div>
        </div>
        <div class="f-row" id="e-doneDateRow" style="display:none"><span class="f-lbl">実行日</span><input class="f-inp" type="date" id="e-donedate"/></div>
      </div>
      <button class="ok-btn" onclick="submitEdit()">保存する</button>
    </div>
  </div>

  <!-- ═══ フィルターモーダル ═══ -->
  <div class="overlay" id="filterModal" onclick="bgClose(event,'filterModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">フィルター / 並び替え</span><button class="x-btn" onclick="closeM('filterModal')">✕</button></div>
      <div class="f-card" style="margin-bottom:10px">
        <div class="filter-row"><span class="filter-lbl">ステータス</span><div class="tgl-g"><button class="tgl" id="fil-all" onclick="setFilter('all')">全て</button><button class="tgl" id="fil-pending" onclick="setFilter('pending')">未実行</button><button class="tgl" id="fil-done" onclick="setFilter('done')">実行済み</button></div></div>
        <div class="filter-row" id="fil-reg-row"><span class="filter-lbl">登録者</span><div class="tgl-g" id="fil-reg-btns"></div></div>
        <div class="filter-row">
          <span class="filter-lbl">行動コスト</span>
          <div class="tgl-g">
            <button class="tgl" id="fil-cost-all"  onclick="setCostFilter('all')">全て</button>
            <button class="tgl" id="fil-cost-free" onclick="setCostFilter('free')">無料</button>
            <button class="tgl" id="fil-cost-low"  onclick="setCostFilter('low')">〜3k</button>
            <button class="tgl" id="fil-cost-mid"  onclick="setCostFilter('mid')">〜1万</button>
            <button class="tgl" id="fil-cost-high" onclick="setCostFilter('high')">1万〜</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="filter-lbl">並び替え</span>
          <div class="tgl-g">
            <button class="tgl" id="sort-reg"    onclick="setSort('reg')">登録日</button>
            <button class="tgl" id="sort-done"   onclick="setSort('done')">実行日</button>
            <button class="tgl" id="sort-desire" onclick="setSort('desire')">やりたい度</button>
          </div>
        </div>
      </div>
      <button class="ok-btn" onclick="closeM('filterModal');render()">適用する</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
/* ═══════════════════════════════
   UTILS
═══════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDay(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}

const COST_LABELS = { free:'無料', low:'〜¥3k', mid:'〜¥1万', high:'¥1万〜' };
const COST_COLORS = { free:'#34c759', low:'#007aff', mid:'#ff9500', high:'#ff3b30' };

function desireStars(n){
  const filled = n||0;
  return Array.from({length:5},(_,i)=>i<filled?'💗':'🤍').join('');
}

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
const STORE='wants_v1';
let items, U, P;
let fStatus='pending', filterStatus='all', filterReg='all', filterCost='all', sortKey='reg', editingId=null;
let addDesire=0, editDesire=0, addCost='', editCost='';
let addTags=[], editTags=[];
let addImgData='', editImgData=''; // base64

/* ═══════════════════════════════
   MIGRATION — 既存データに新フィールドを追加
═══════════════════════════════ */
function migrateItem(w){
  return {
    tags:    w.tags    ?? [],
    map:     w.map     ?? '',
    cost:    w.cost    ?? '',
    image:   w.image   ?? '',
    desire:  w.desire  ?? 0,
    ...w,  // 既存フィールドで上書き（既に値がある場合優先）
  };
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
function init(){
  if(!requireLogin())return;
  U=currentUser(); P=getAccount(partnerId());
  applyTheme(U.theme);
  document.getElementById('nav').innerHTML=navHTML('wants');
  syncOnLoad(['wants','accounts']).then(()=>{
    try{
      const s=JSON.parse(localStorage.getItem(STORE));
      items = (Array.isArray(s)&&s.length) ? s.map(migrateItem) : sampleItems();
    }catch{ items=sampleItems(); }
    autoDelete(); applyFilterUI(); render();
  });
}

function sampleItems(){return[
  migrateItem({id:uid(),title:'花畑へ行く',regDate:'2026-03-02',period:'2026/4/1〜4/30',url:'',memo:'春限定',registrar:'A',status:'pending',doneDate:null,createdAt:'2026-03-02T00:00'}),
  migrateItem({id:uid(),title:'水族館デート',regDate:'2026-03-02',period:'',url:'',memo:'',registrar:'B',status:'pending',doneDate:null,createdAt:'2026-03-02T00:00'}),
  migrateItem({id:uid(),title:'動物園',regDate:'2026-03-02',period:'',url:'',memo:'',registrar:'B',status:'done',doneDate:'2026-03-15',createdAt:'2026-03-02T00:00'}),
]}

function accountName(id){return id===U.id?U.name:P.name}
function accountIcon(id){return id===U.id?U.icon:P.icon}

function persist(){
  localStorage.setItem(STORE,JSON.stringify(items));
  syncOnSave('wants',items);
}
function autoDelete(){
  const y3=3*365*24*60*60*1000,now=Date.now(),b=items.length;
  items=items.filter(w=>{if(w.status!=='done'||!w.doneDate)return true;return now-new Date(w.doneDate).getTime()<y3});
  if(items.length!==b)persist();
}

/* ═══════════════════════════════
   RENDER
═══════════════════════════════ */
function render(){
  const el=document.getElementById('scroll');
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let list=items.filter(w=>{
    if(q&&!w.title.toLowerCase().includes(q)&&!(w.memo||'').toLowerCase().includes(q)&&!((w.tags||[]).join(' ').toLowerCase().includes(q)))return false;
    if(filterStatus!=='all'&&w.status!==filterStatus)return false;
    if(filterReg!=='all'&&w.registrar!==filterReg)return false;
    if(filterCost!=='all'&&w.cost!==filterCost)return false;
    return true;
  });
  list.sort((a,b)=>{
    if(sortKey==='done')   return(b.doneDate||'').localeCompare(a.doneDate||'');
    if(sortKey==='desire') return(b.desire||0)-(a.desire||0);
    return(b.regDate||'').localeCompare(a.regDate||'');
  });
  const pending=list.filter(w=>w.status==='pending'), done=list.filter(w=>w.status==='done');
  const total=items.length, doneAll=items.filter(w=>w.status==='done').length;
  const aCount=items.filter(w=>w.registrar===U.id).length, bCount=items.filter(w=>w.registrar===P.id).length;

  const row=w=>{
    const tagHtml=(w.tags||[]).map(t=>`<span class="c-tag">#${t}</span>`).join('');
    const desireDots=Array.from({length:5},(_,i)=>`<span class="c-desire-dot" style="background:${i<(w.desire||0)?'#ff2d55':'#e5e5ea'}"></span>`).join('');
    const costLabel = w.cost ? COST_LABELS[w.cost] : '';
    const costColor = w.cost ? COST_COLORS[w.cost] : '';
    return `
      <div class="c-row" onclick="openDetail('${w.id}')">
        <div class="c-thumb">
          ${w.image?`<img src="${w.image}" loading="lazy"/>`:'<div class="c-thumb-empty">🗂️</div>'}
        </div>
        <div class="c-body">
          <div class="c-main">
            <div class="c-title">${w.title}</div>
            <div class="c-sub">登録: ${fmtDay(w.regDate)} · ${accountIcon(w.registrar)} ${accountName(w.registrar)}${w.period?' · '+w.period:''}</div>
            ${tagHtml?`<div class="c-tags">${tagHtml}</div>`:''}
            <div class="c-meta">
              <div class="c-desire">${desireDots}</div>
              ${costLabel?`<span class="c-cost" style="color:${costColor}">💴 ${costLabel}</span>`:''}
            </div>
          </div>
          <div class="c-right">
            <span class="badge ${w.status==='done'?'b-green':'b-orange'}">${w.status==='done'?'実行済み':'未実行'}</span>
          </div>
        </div>
      </div>`;
  };

  el.innerHTML=`
    <div class="chart-row">
      <div class="chart-box"><div class="chart-lbl">実行率</div><div class="pie-wrap"><canvas id="pie1"></canvas><div class="pie-center"><div class="pie-num">${total?Math.round(doneAll/total*100):0}</div><div class="pie-unit">%</div></div></div><div class="chart-sub">${doneAll} / ${total} 件</div></div>
      <div class="chart-box"><div class="chart-lbl">登録数の割合</div><div class="pie-wrap"><canvas id="pie2"></canvas><div class="pie-center"><div class="pie-num" style="font-size:11px;color:var(--sub)">${U.icon}:${aCount}<br>${P.icon}:${bCount}</div></div></div><div class="chart-sub">全 ${total} 件</div></div>
    </div>
    <div class="sec-lbl">未実行 (${pending.length})</div>
    <div class="c-list">${pending.length?pending.map(row).join(''):'<div class="empty-row">データなし</div>'}</div>
    <div class="sec-lbl">実行済み (${done.length})</div>
    <div class="c-list">${done.length?done.map(row).join(''):'<div class="empty-row">データなし</div>'}</div>
    <div style="height:6px"></div>`;

  drawPie('pie1',[doneAll,total-doneAll],['#34c759','#e5e5ea']);
  drawPie('pie2',[aCount,bCount],[U.theme,P.theme]);
}

function drawPie(id,data,colors){
  const c=document.getElementById(id);if(!c)return;
  c.width=76;c.height=76;const ctx=c.getContext('2d');
  const total=data.reduce((s,v)=>s+v,0)||1;let angle=-Math.PI/2;
  data.forEach((v,i)=>{const sl=(v/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(38,38);ctx.arc(38,38,35,angle,angle+sl);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();angle+=sl});
  ctx.beginPath();ctx.arc(38,38,20,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

/* ═══════════════════════════════
   MODAL HELPERS
═══════════════════════════════ */
function openM(id){document.getElementById(id).classList.add('open')}
function closeM(id){document.getElementById(id).classList.remove('open')}
function bgClose(e,id){if(e.target===document.getElementById(id))closeM(id)}

/* ═══════════════════════════════
   TAG HELPERS
═══════════════════════════════ */
function renderTags(mode){
  const tags = mode==='add' ? addTags : editTags;
  const wrapId = mode==='add' ? 'addTagWrap' : 'editTagWrap';
  const inputId = mode==='add' ? 'addTagInput' : 'editTagInput';
  const wrap = document.getElementById(wrapId);
  const inp  = document.getElementById(inputId);
  const chips = tags.map((t,i)=>`<span class="tag-chip">#${t}<span class="tag-chip-del" onclick="removeTag('${mode}',${i})">✕</span></span>`).join('');
  wrap.innerHTML = chips;
  wrap.appendChild(inp);
}
function handleTagKey(e, mode){
  if(e.key!=='Enter'&&e.key!==','&&e.key!=='　')return;
  e.preventDefault();
  const inp = document.getElementById(mode==='add'?'addTagInput':'editTagInput');
  const val = inp.value.trim().replace(/^#/,'');
  if(!val)return;
  if(mode==='add'){ if(!addTags.includes(val))addTags.push(val); }
  else            { if(!editTags.includes(val))editTags.push(val); }
  inp.value='';
  renderTags(mode);
}
function removeTag(mode, idx){
  if(mode==='add')  addTags.splice(idx,1);
  else              editTags.splice(idx,1);
  renderTags(mode);
}

/* ═══════════════════════════════
   DESIRE / COST
═══════════════════════════════ */
function setDesire(mode, val){
  if(mode==='add') addDesire=val;
  else             editDesire=val;
  renderDesire(mode, val);
}
function renderDesire(mode, val){
  const row = document.getElementById(mode==='add'?'addDesireRow':'editDesireRow');
  row.querySelectorAll('.d-star').forEach((s,i)=>{ s.textContent = i<val?'💗':'🤍'; });
}

function setCost(mode, val){
  if(mode==='add') addCost=val;
  else             editCost=val;
  const container = document.getElementById(mode==='add'?'addCostBtns':'editCostBtns');
  container.querySelectorAll('.cost-btn').forEach(b=>{
    b.className = 'cost-btn ' + (b.textContent.replace(/[〜¥]/g,'') === val || b.onclick.toString().includes(`'${val}'`) ? 'cost-on' : 'cost-off');
  });
  // simpler: re-check by data value
  const keys=['free','low','mid','high'];
  const labels=['無料','〜¥3k','〜¥1万','¥1万〜'];
  container.querySelectorAll('.cost-btn').forEach((b,i)=>{
    b.className='cost-btn '+(keys[i]===val?'cost-on':'cost-off');
  });
}

/* ═══════════════════════════════
   IMAGE
═══════════════════════════════ */
function onAddImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    addImgData=e.target.result;
    document.getElementById('addImgEl').src=addImgData;
    document.getElementById('addImgPreview').style.display='block';
  };
  reader.readAsDataURL(file);
}
function removeAddImg(){addImgData='';document.getElementById('addImgPreview').style.display='none';document.getElementById('addImgInput').value='';}

function onEditImg(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    editImgData=e.target.result;
    document.getElementById('editImgEl').src=editImgData;
    document.getElementById('editImgPreview').style.display='block';
  };
  reader.readAsDataURL(file);
}
function removeEditImg(){editImgData='';document.getElementById('editImgPreview').style.display='none';document.getElementById('editImgInput').value='';}

/* ═══════════════════════════════
   ADD
═══════════════════════════════ */
function openAdd(){
  document.getElementById('f-title').value='';
  document.getElementById('f-period').value='';
  document.getElementById('f-url').value='';
  document.getElementById('f-map').value='';
  document.getElementById('f-memo').value='';
  document.getElementById('f-donedate').value=todayStr();
  document.getElementById('addRegLabel').textContent=U.icon+' '+U.name;
  addTags=[]; addDesire=0; addCost=''; addImgData='';
  renderTags('add'); renderDesire('add',0);
  document.getElementById('addCostBtns').querySelectorAll('.cost-btn').forEach(b=>b.className='cost-btn cost-off');
  document.getElementById('addImgPreview').style.display='none';
  setAddStatus('pending');
  openM('addModal');
}
function setAddStatus(s){
  fStatus=s;
  document.getElementById('t-pending').className='tgl '+(s==='pending'?'tgl-orange':'tgl-off');
  document.getElementById('t-done').className='tgl '+(s==='done'?'tgl-green':'tgl-off');
  document.getElementById('doneDateRow').style.display=s==='done'?'flex':'none';
}
function submitAdd(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('タイトルを入力してください');return}
  items.push(migrateItem({
    id:uid(), title, regDate:todayStr(),
    period: document.getElementById('f-period').value.trim(),
    url:    document.getElementById('f-url').value.trim(),
    map:    document.getElementById('f-map').value.trim(),
    memo:   document.getElementById('f-memo').value.trim(),
    tags:   [...addTags],
    desire: addDesire,
    cost:   addCost,
    image:  addImgData,
    registrar: U.id,
    status: fStatus,
    doneDate: fStatus==='done'?(document.getElementById('f-donedate').value||todayStr()):null,
    createdAt: new Date().toISOString(),
  }));
  persist(); closeM('addModal'); render();
}

/* ═══════════════════════════════
   DETAIL
═══════════════════════════════ */
function openDetail(id){
  const w=items.find(x=>x.id===id); if(!w)return;
  editingId=id;
  const tagHtml=(w.tags||[]).map(t=>`<span class="det-tag">#${t}</span>`).join('');
  const costLabel = w.cost?COST_LABELS[w.cost]:'';
  const costColor = w.cost?COST_COLORS[w.cost]:'';

  document.getElementById('detBody').innerHTML=`
    ${w.image?`<img class="det-hero" src="${w.image}"/>`:''}
    <div class="det-title">${w.title}</div>
    ${tagHtml?`<div class="det-tags">${tagHtml}</div>`:''}
    <div class="det-row"><span class="det-k">ステータス</span><span class="det-v">${w.status==='done'?'✅ 実行済み':'⏳ 未実行'}</span></div>
    <div class="det-row"><span class="det-k">やりたい度</span><span class="det-v">${desireStars(w.desire)}</span></div>
    ${costLabel?`<div class="det-row"><span class="det-k">行動コスト</span><span class="det-v" style="color:${costColor}">${costLabel}</span></div>`:''}
    <div class="det-row"><span class="det-k">登録者</span><span class="det-v">${accountIcon(w.registrar)} ${accountName(w.registrar)}</span></div>
    <div class="det-row"><span class="det-k">登録日</span><span class="det-v">${fmtDay(w.regDate)}</span></div>
    ${w.doneDate?`<div class="det-row"><span class="det-k">実行日</span><span class="det-v">${fmtDay(w.doneDate)}</span></div>`:''}
    ${w.period?`<div class="det-row"><span class="det-k">イベント期間</span><span class="det-v">${w.period}</span></div>`:''}
    ${w.url?`<div class="det-row"><span class="det-k">URL</span><span class="det-v"><a href="${w.url}" target="_blank">${w.url}</a></span></div>`:''}
    ${w.map?`<div class="det-row"><span class="det-k">マップ</span><span class="det-v"><a class="map-link" href="${w.map}" target="_blank">📍 地図を開く</a></span></div>`:''}
    ${w.memo?`<div class="det-row"><span class="det-k">メモ</span><span class="det-v">${w.memo}</span></div>`:''}
  `;

  const toggleBtn=document.getElementById('toggleBtn');
  if(w.status==='done'){
    toggleBtn.textContent='↩ 未実行に戻す'; toggleBtn.className='ok-btn orange';
    toggleBtn.onclick=()=>{w.status='pending';w.doneDate=null;persist();closeM('detModal');render()};
  }else{
    toggleBtn.textContent='✅ 実行済みにする'; toggleBtn.className='ok-btn green';
    toggleBtn.onclick=()=>{w.status='done';w.doneDate=todayStr();persist();closeM('detModal');render()};
  }
  document.getElementById('delBtn').onclick=()=>{if(!confirm('削除しますか？'))return;items=items.filter(x=>x.id!==id);persist();closeM('detModal');render()};
  openM('detModal');
}

/* ═══════════════════════════════
   EDIT
═══════════════════════════════ */
function openEdit(){
  const w=items.find(x=>x.id===editingId); if(!w)return;
  document.getElementById('e-title').value  = w.title||'';
  document.getElementById('e-period').value = w.period||'';
  document.getElementById('e-url').value    = w.url||'';
  document.getElementById('e-map').value    = w.map||'';
  document.getElementById('e-memo').value   = w.memo||'';
  document.getElementById('e-donedate').value = w.doneDate||todayStr();
  document.getElementById('e-doneDateRow').style.display = w.status==='done'?'flex':'none';

  editTags    = [...(w.tags||[])];
  editDesire  = w.desire||0;
  editCost    = w.cost||'';
  editImgData = w.image||'';

  renderTags('edit');
  renderDesire('edit', editDesire);
  if(editCost) setCost('edit', editCost);
  else document.getElementById('editCostBtns').querySelectorAll('.cost-btn').forEach(b=>b.className='cost-btn cost-off');

  if(editImgData){
    document.getElementById('editImgEl').src=editImgData;
    document.getElementById('editImgPreview').style.display='block';
  }else{
    document.getElementById('editImgPreview').style.display='none';
  }

  closeM('detModal'); openM('editModal');
}
function submitEdit(){
  const title=document.getElementById('e-title').value.trim();
  if(!title){alert('タイトルを入力してください');return}
  const w=items.find(x=>x.id===editingId); if(!w)return;
  w.title   = title;
  w.period  = document.getElementById('e-period').value.trim();
  w.url     = document.getElementById('e-url').value.trim();
  w.map     = document.getElementById('e-map').value.trim();
  w.memo    = document.getElementById('e-memo').value.trim();
  w.tags    = [...editTags];
  w.desire  = editDesire;
  w.cost    = editCost;
  w.image   = editImgData;
  if(w.status==='done') w.doneDate = document.getElementById('e-donedate').value||w.doneDate;
  persist(); closeM('editModal'); render();
}

/* ═══════════════════════════════
   FILTER
═══════════════════════════════ */
function openFilter(){applyFilterUI();openM('filterModal')}
function applyFilterUI(){
  const fs=filterStatus, fr=filterReg, fc=filterCost, sk=sortKey;
  document.getElementById('fil-all').className    ='tgl '+(fs==='all'    ?'tgl-accent':'tgl-off');
  document.getElementById('fil-pending').className='tgl '+(fs==='pending'?'tgl-orange':'tgl-off');
  document.getElementById('fil-done').className   ='tgl '+(fs==='done'   ?'tgl-green' :'tgl-off');
  // 登録者
  document.getElementById('fil-reg-btns').innerHTML=`
    <button class="tgl ${fr==='all'?'tgl-accent':'tgl-off'}" onclick="setRegFilter('all')">全て</button>
    <button class="tgl ${fr===U.id?'tgl-accent':'tgl-off'}" onclick="setRegFilter('${U.id}')">${U.icon} ${U.name}</button>
    <button class="tgl ${fr===P.id?'tgl-accent':'tgl-off'}" onclick="setRegFilter('${P.id}')">${P.icon} ${P.name}</button>`;
  // コスト
  ['all','free','low','mid','high'].forEach(k=>{
    const el=document.getElementById('fil-cost-'+k);
    if(el)el.className='tgl '+(fc===k?'tgl-accent':'tgl-off');
  });
  // ソート
  document.getElementById('sort-reg').className   ='tgl '+(sk==='reg'   ?'tgl-accent':'tgl-off');
  document.getElementById('sort-done').className  ='tgl '+(sk==='done'  ?'tgl-accent':'tgl-off');
  document.getElementById('sort-desire').className='tgl '+(sk==='desire'?'tgl-accent':'tgl-off');
}
function setFilter(v)    {filterStatus=v; applyFilterUI()}
function setRegFilter(v) {filterReg=v;    applyFilterUI()}
function setCostFilter(v){filterCost=v;   applyFilterUI()}
function setSort(v)      {sortKey=v;       applyFilterUI()}

init();
</script>
</body>
</html>
