<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>やりたいことリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="icon" href="photo/favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#6b7280;--muted:#aeaeb2;--border:rgba(0,0,0,0.07);--accent:#7c7aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--r:14px;--nav:62px}
html,body{height:100%;background:#c9c9ce;display:flex;justify-content:center;align-items:center;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.phone{width:min(390px,100vw);height:min(844px,100dvh);background:var(--bg);border-radius:clamp(0px,calc((100vw - 390px)*-99),48px);overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 80px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.09)}
.hdr{padding:max(52px,env(safe-area-inset-top,52px)) 20px 10px;background:var(--bg);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.hdr-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.hdr-acts{display:flex;gap:6px}
.hdr-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:none;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--sub);transition:background .15s}
.hdr-btn:active{background:var(--border)}
.search-wrap{padding:4px 14px 10px;flex-shrink:0}
.search-box{background:var(--card);border-radius:12px;display:flex;align-items:center;gap:8px;padding:10px 14px}
.search-box input{flex:1;border:none;outline:none;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:transparent}
.search-box input::placeholder{color:var(--muted)}
.scroll{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}
.chart-row{display:flex;gap:8px;margin-bottom:8px}
.chart-box{flex:1;background:var(--card);border-radius:var(--r);padding:14px 10px;display:flex;flex-direction:column;align-items:center}
.chart-lbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;margin-bottom:8px;text-align:center}
.chart-sub{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
.pie-wrap{position:relative;width:76px;height:76px}
.pie-wrap canvas{width:76px!important;height:76px!important}
.pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.pie-num{font-size:16px;font-weight:700;color:var(--text)}
.pie-unit{font-size:10px;color:var(--sub)}
.sec-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.07em;text-transform:uppercase;padding:14px 2px 6px}
.c-list{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:6px}
.c-row{display:flex;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--border);gap:10px;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
.c-row:last-child{border-bottom:none}
.c-row:active{background:#f5f5fa}
.c-main{flex:1;min-width:0}
.c-title{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:12px;color:var(--sub);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.c-right{text-align:right;flex-shrink:0}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block}
.b-orange{background:#fff3e0;color:var(--orange)}
.b-green{background:#e3f9eb;color:var(--green)}
.empty-row{padding:24px;text-align:center;font-size:14px;color:var(--muted)}
.tag-chip{font-size:10px;padding:2px 8px;border-radius:999px;background:#eef1ff;color:var(--accent);display:inline-block}
.fab{position:absolute;bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px) + 18px);right:18px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(124,122,255,.5);transition:transform .15s;z-index:20}
.fab:active{transform:scale(.91)}
.nav{height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(250,250,250,.96);border-top:.5px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0;backdrop-filter:blur(20px);z-index:30}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:10px 0 6px;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.nav-item:active{transform:scale(.88)}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--accent);font-weight:700}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.42);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--bg);border-radius:24px 24px 0 0;transform:translateY(100%);max-height:92%;overflow-y:auto;overflow-x:hidden;transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:12px auto 0}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 10px}
.sh-title{font-size:17px;font-weight:700;color:var(--text)}
.x-btn{width:28px;height:28px;border-radius:50%;background:#e4e4e9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--sub)}
.f-card{background:var(--card);border-radius:var(--r);margin:0 14px 10px;overflow:hidden}
.f-row{display:flex;align-items:flex-start;padding:13px 16px;border-bottom:.5px solid var(--border);gap:10px;min-width:0}
.f-row:last-child{border-bottom:none}
.f-lbl{font-size:15px;color:var(--text);min-width:86px;flex-shrink:0;padding-top:2px;white-space:nowrap}
.f-inp{flex:1;min-width:0;width:100%;border:none;outline:none;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:transparent;text-align:right}
.f-row input[type=text].f-inp,.f-row input[type=url].f-inp,.f-row input[type=number].f-inp{text-align:left}.f-inp::placeholder{color:#c7c7cc}
.f-inp.left{text-align:left}
input[type=date]{color-scheme:light}
textarea.f-inp{text-align:left;resize:none;line-height:1.6;padding:2px 0}
.tgl-g{display:flex;gap:6px;margin-left:auto}
.tgl{padding:7px 12px;border-radius:11px;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;cursor:pointer;transition:background .16s,color .16s}
.tgl-off{background:#e4e4e9;color:var(--sub)}
.tgl-accent{background:var(--accent);color:#fff}
.tgl-green{background:var(--green);color:#fff}
.tgl-orange{background:var(--orange);color:#fff}
.ok-btn{display:block;width:calc(100% - 28px);margin:2px 14px 22px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.04em;transition:opacity .15s,transform .12s}
.ok-btn:active{opacity:.82;transform:scale(.98)}
.ok-btn.green{background:var(--green)}
.ok-btn.orange{background:var(--orange)}
.del-btn{display:block;width:calc(100% - 28px);margin:4px 14px 22px;padding:13px;background:#ffe5e4;color:var(--red);border:none;border-radius:var(--r);font-size:15px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.det-title{font-size:20px;font-weight:700;color:var(--text);padding:4px 16px 12px;line-height:1.4}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 16px;border-bottom:.5px solid var(--border);font-size:14px;gap:12px}
.det-row:last-child{border-bottom:none}
.det-k{color:var(--sub);flex-shrink:0}
.det-v{color:var(--text);font-weight:500;text-align:right;word-break:break-all;max-width:230px}
.det-v a{color:var(--accent);text-decoration:none}
.filter-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:.5px solid var(--border)}
.filter-row:last-child{border-bottom:none}
.filter-lbl{font-size:14px;color:var(--text)}
#fil-tag-row{justify-content:space-between;align-items:center}
#fil-tag-row .filter-lbl{margin-top:0}
#fil-tag-row .plus-ctl{margin-left:auto;max-width:260px;flex:0 1 auto}
#fil-tag-row .plus-list{max-width:220px;width:100%}
.plus-ctl{margin-left:auto;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.plus-list{display:flex;flex-direction:column;gap:8px;flex:1}
.plus-row{display:flex;align-items:center;gap:8px}
.plus-input{flex:1;background:#f5f5fa;border:1px solid #e6e7ef;border-radius:10px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif}
.plus-input:focus{outline:none;border-color:var(--accent)}
.mini-plus,.mini-del{border:none;border-radius:999px;width:25px;height:25px;font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
.mini-plus{background:#eceeff;color:var(--accent)}
.mini-del{background:#ffe5e4;color:var(--red)}
.hidden{display:none!important}
.tag-drop{background:#fff;border:1px solid #e3e4ef;border-radius:10px;padding:4px;margin-top:4px;max-height:96px;overflow:auto}
.tag-option{padding:8px 9px;border-radius:8px;font-size:12px;cursor:pointer}
.tag-option:active,.tag-option:hover{background:#f0f2ff}
.meter-wrap{margin-left:auto;display:flex;flex-direction:column;gap:10px;flex:1}
.meter-row{display:flex;align-items:center;gap:8px}
.meter-row span{font-size:12px;color:var(--sub);min-width:40px}
.meter-row input{flex:1}
.preview-img{width:100%;max-width:160px;border-radius:10px;border:1px solid #ececf4;display:none;margin-left:auto}
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="hdr-title">やりたいことリスト</div>
    <div class="hdr-acts">
      <button class="hdr-btn" onclick="openFilter()">⚙️</button>
      <button class="hdr-btn" onclick="location.href='04_bingo.html'">⬛</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span style="font-size:16px;color:var(--muted)">🔍</span>
      <input id="searchInput" placeholder="検索..." oninput="render()"/>
    </div>
  </div>
  <div class="scroll" id="scroll"></div>
  <button class="fab" onclick="openAdd()">＋</button>
  <nav class="nav" id="nav"></nav>

  <!-- 追加モーダル（登録者は自動設定・表示のみ） -->
  <div class="overlay" id="addModal" onclick="bgClose(event,'addModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">やりたいことを追加</span><button class="x-btn" onclick="closeM('addModal')">✕</button></div>
      <div class="f-card">
        <div class="f-row"><span class="f-lbl">やりたいこと</span><input class="f-inp" type="text" id="f-title" placeholder="例：花畑へ行く"/></div>
        <div class="f-row"><span class="f-lbl">イベント日付</span><div class="plus-ctl"><input class="plus-input" type="date" id="f-event-day"/><button class="mini-plus" onclick="toggleAddPeriod()" type="button">＋</button></div></div>
        <div class="f-row hidden" id="f-period-row"><span class="f-lbl">イベント期間</span><div class="plus-ctl"><input class="plus-input" type="date" id="f-period-start"/><input class="plus-input" type="date" id="f-period-end"/><button class="mini-plus" onclick="toggleAddPeriod()" type="button">−</button></div></div>
        <div class="f-row"><span class="f-lbl">URL</span><div class="plus-ctl"><div class="plus-list" id="f-url-list"></div><button class="mini-plus" type="button" onclick="addPlusInput('f-url-list','url')">＋</button></div></div>
        <div class="f-row"><span class="f-lbl">マップ</span><input class="f-inp" type="url" id="f-map" placeholder="GoogleMapなど"/></div>
        <div class="f-row"><span class="f-lbl">画像URL</span><input class="f-inp" type="url" id="f-image" placeholder="https://..." oninput="previewImage('f-image','f-image-preview')"/></div>
        <div class="f-row"><span class="f-lbl">画像プレビュー</span><img id="f-image-preview" class="preview-img" alt="preview"/></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">タグ</span><div class="plus-ctl"><div class="plus-list" id="f-tag-list"></div><button class="mini-plus" type="button" onclick="addTagInput('f-tag-list')">＋</button></div></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">メモ</span><textarea class="f-inp left" id="f-memo" rows="2" placeholder="任意"></textarea></div>
      </div>
      <div class="f-card">
        <div class="f-row"><span class="f-lbl">登録者</span><span id="addRegLabel" style="font-size:14px;color:var(--sub);margin-left:auto"></span></div>
        <div class="f-row"><span class="f-lbl">ステータス</span><div class="tgl-g"><button class="tgl tgl-orange" id="t-pending" onclick="setAddStatus('pending')">未実行</button><button class="tgl tgl-off" id="t-done" onclick="setAddStatus('done')">実行済み</button></div></div>
        <div class="f-row" id="doneDateRow" style="display:none"><span class="f-lbl">実行日</span><input class="f-inp" type="date" id="f-donedate"/></div>
        <div class="f-row"><span class="f-lbl">やりたい度</span><div class="meter-wrap"><div class="meter-row"><span id="meter-a-name"></span><input type="range" id="f-meter-a" min="1" max="5" value="3"/></div><div class="meter-row"><span id="meter-b-name"></span><input type="range" id="f-meter-b" min="1" max="5" value="3"/></div></div></div>
      </div>
      <button class="ok-btn" onclick="submitAdd()">追加する</button>
    </div>
  </div>

  <div class="overlay" id="detModal" onclick="bgClose(event,'detModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">詳細</span><button class="x-btn" onclick="closeM('detModal')">✕</button></div>
      <div id="detBody"></div>
      <button class="ok-btn" id="editBtn" style="background:var(--accent);margin-bottom:6px" onclick="openEdit()">✏️ 編集する</button>
      <button class="ok-btn green" id="toggleBtn">✅ 実行済みにする</button>
      <button class="del-btn" id="delBtn">🗑 削除する</button>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div class="overlay" id="editModal" onclick="bgClose(event,'editModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">やりたいことを編集</span><button class="x-btn" onclick="closeM('editModal')">✕</button></div>
      <div class="f-card">
        <div class="f-row"><span class="f-lbl">やりたいこと</span><input class="f-inp" type="text" id="e-title"/></div>
        <div class="f-row"><span class="f-lbl">イベント日付</span><div class="plus-ctl"><input class="plus-input" type="date" id="e-event-day"/><button class="mini-plus" onclick="toggleEditPeriod()" type="button">＋</button></div></div>
        <div class="f-row hidden" id="e-period-row"><span class="f-lbl">イベント期間</span><div class="plus-ctl"><input class="plus-input" type="date" id="e-period-start"/><input class="plus-input" type="date" id="e-period-end"/><button class="mini-plus" onclick="toggleEditPeriod()" type="button">−</button></div></div>
        <div class="f-row"><span class="f-lbl">URL</span><div class="plus-ctl"><div class="plus-list" id="e-url-list"></div><button class="mini-plus" type="button" onclick="addPlusInput('e-url-list','url')">＋</button></div></div>
        <div class="f-row"><span class="f-lbl">マップ</span><input class="f-inp" type="url" id="e-map"/></div>
        <div class="f-row"><span class="f-lbl">画像URL</span><input class="f-inp" type="url" id="e-image" oninput="previewImage('e-image','e-image-preview')"/></div>
        <div class="f-row"><span class="f-lbl">画像プレビュー</span><img id="e-image-preview" class="preview-img" alt="preview"/></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">タグ</span><div class="plus-ctl"><div class="plus-list" id="e-tag-list"></div><button class="mini-plus" type="button" onclick="addTagInput('e-tag-list')">＋</button></div></div>
        <div class="f-row" style="align-items:flex-start;padding-top:14px"><span class="f-lbl" style="padding-top:2px">メモ</span><textarea class="f-inp left" id="e-memo" rows="2"></textarea></div>
        <div class="f-row" id="e-doneDateRow" style="display:none"><span class="f-lbl">実行日</span><input class="f-inp" type="date" id="e-donedate"/></div>
        <div class="f-row"><span class="f-lbl">やりたい度</span><div class="meter-wrap"><div class="meter-row"><span id="e-meter-a-name"></span><input type="range" id="e-meter-a" min="1" max="5" value="3"/></div><div class="meter-row"><span id="e-meter-b-name"></span><input type="range" id="e-meter-b" min="1" max="5" value="3"/></div></div></div>
      </div>
      <button class="ok-btn" onclick="submitEdit()">保存する</button>
    </div>
  </div>

  <div class="overlay" id="filterModal" onclick="bgClose(event,'filterModal')">
    <div class="sheet">
      <div class="sh-handle"></div>
      <div class="sh-hdr"><span class="sh-title">フィルター / 並び替え</span><button class="x-btn" onclick="closeM('filterModal')">✕</button></div>
      <div class="f-card" style="margin-bottom:10px">
        <div class="filter-row"><span class="filter-lbl">ステータス</span><div class="tgl-g"><button class="tgl" id="fil-all" onclick="setFilter('all')">全て</button><button class="tgl" id="fil-pending" onclick="setFilter('pending')">未実行</button><button class="tgl" id="fil-done" onclick="setFilter('done')">実行済み</button></div></div>
        <div class="filter-row"><span class="filter-lbl">マップ</span><div class="tgl-g"><button class="tgl" id="fil-map-all" onclick="setMapFilter('all')">全て</button><button class="tgl" id="fil-map-has" onclick="setMapFilter('has')">あり</button><button class="tgl" id="fil-map-none" onclick="setMapFilter('none')">なし</button></div></div>
        <div class="filter-row" id="fil-reg-row"><span class="filter-lbl">登録者</span><div class="tgl-g" id="fil-reg-btns"></div></div>
        <div class="filter-row" id="fil-tag-row" style="padding-top:14px"><span class="filter-lbl">タグ</span><div class="plus-ctl"><div class="plus-list" id="fil-tag-list"></div><button class="mini-plus" type="button" onclick="addTagInput('fil-tag-list')">＋</button></div></div>
        <div class="filter-row"><span class="filter-lbl">並び替え</span><div class="tgl-g"><button class="tgl" id="sort-reg" onclick="setSort('reg')">登録日</button><button class="tgl" id="sort-done" onclick="setSort('done')">実行日</button></div></div>
      </div>
      <button class="ok-btn" onclick="closeM('filterModal');render()">適用する</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDay(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}

const STORE='wants_v2';
const TAG_STORE='wants_tags_v1';
const defaultTags=['ドライブ','町','☆','☆☆','☆☆☆'];
let items,U,P;
let fStatus='pending',filterStatus='all',filterMap='all',filterReg='all',filterTags=[],sortKey='reg',editingId=null;

function init(){
  if(!requireLogin())return;
  U=currentUser();P=getAccount(partnerId());
  applyTheme(U.theme);
  document.getElementById('nav').innerHTML=navHTML('wants');
  document.getElementById('meter-a-name').textContent=U.name;
  document.getElementById('meter-b-name').textContent=P.name;
  document.getElementById('e-meter-a-name').textContent=U.name;
  document.getElementById('e-meter-b-name').textContent=P.name;
  syncOnLoad(['wants','accounts']).then(()=>{
    const stored = localStorage.getItem(STORE) || localStorage.getItem('wants_v1');
    try{
      const s=JSON.parse(stored);
      items=(Array.isArray(s)&&s.length)?s:sampleItems();
    }catch{items=sampleItems()}
    if(!localStorage.getItem(STORE)){
      localStorage.setItem(STORE,JSON.stringify(items));
    }
    migrateLegacy();
    autoDelete();applyFilterUI();render();
  });
}

function sampleItems(){
  return [

function migrateLegacy(){
  items=items.map(w=>({
    ...w,
    createdAt:w.createdAt||new Date((w.regDate||todayStr())+'T00:00:00').toISOString(),
    eventType:w.eventType||(w.period?'period':'single'),

function accountName(id){return id===U.id?U.name:P.name}
function accountIcon(id,size=16){return iconHTML(id===U.id?U.icon:P.icon,size)}

function persist(){localStorage.setItem(STORE,JSON.stringify(items));syncOnSave('wants',items)}

function autoDelete(){
  const y3=3*365*24*60*60*1000,now=Date.now(),b=items.length;
  items=items.filter(w=>{if(!w.doneDate)return true;return now-new Date(w.doneDate).getTime()<y3});
  if(items.length!==b)persist();
}

function openM(id){document.getElementById(id).classList.add('open')}
function closeM(id){document.getElementById(id).classList.remove('open')}
function bgClose(e,id){if(e.target===document.getElementById(id))closeM(id)}

function parsePeriod(period){
  const m=String(period||'').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/g);
  if(!m||m.length<2)return['',''];
  const toDate=v=>{const p=v.split('/');return`${p[0]}-${String(p[1]).padStart(2,'0')}-${String(p[2]).padStart(2,'0')}`};
  return [toDate(m[0]),toDate(m[1])];
}
function buildPeriod(start,end){
  if(!start&&!end)return'';
  if(!start||!end){alert('イベント期間は開始日と終了日を両方入力してください');return null}
  if(start>end){alert('イベント期間は開始日〜終了日の順にしてください');return null}
  const s=start.split('-'),e=end.split('-');
  return `${s[0]}/${+s[1]}/${+s[2]}〜${e[0]}/${+e[1]}/${+e[2]}`;
}
function formatDateTime(s){
  if(!s)return'—';
  const d=new Date(s);if(isNaN(d))return'—';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function render(){
  const el=document.getElementById('scroll');
  filterTags = collectPlusValues('fil-tag-list');
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let list=items.filter(w=>{
    const target=[w.title,w.memo,(w.tags||[]).join(' '),(w.urls||[]).join(' '),w.mapUrl||''].join(' ').toLowerCase();
    if(q&&!target.includes(q))return false;
    if(filterStatus!=='all'&&w.status!==filterStatus)return false;
    if(filterReg!=='all'&&w.registrar!==filterReg)return false;
    if(filterMap==='has'&&!w.mapUrl)return false;
    if(filterMap==='none'&&w.mapUrl)return false;
    if(filterTags.length){
      const tags=w.tags||[];
      if(!filterTags.some(t=>tags.includes(t)))return false;
    }
    return true;
  });
  list.sort((a,b)=>sortKey==='done'?(b.doneDate||'').localeCompare(a.doneDate||''):(b.createdAt||'').localeCompare(a.createdAt||''));
  const pending=list.filter(w=>w.status==='pending'),done=list.filter(w=>w.status==='done');
  const total=items.length,doneAll=items.filter(w=>w.status==='done').length;
  const aCount=items.filter(w=>w.registrar===U.id).length,bCount=items.filter(w=>w.registrar===P.id).length;
  const row=w=>`<div class="c-row" onclick="openDetail('${w.id}')"><div class="c-main"><div class="c-title">${esc(w.title)}</div><div class="c-sub">登録: ${fmtDay(w.regDate)} · ${accountIcon(w.registrar)} ${accountName(w.registrar)} ${(w.eventType==='period'&&w.period)?' · '+w.period:(w.eventDate?' · '+fmtDay(w.eventDate):'')} ${(w.tags||[]).slice(0,2).map(t=>`<span class='tag-chip'>${esc(t)}</span>`).join('')}</div></div><div class="c-right"><span class="badge ${w.status==='done'?'b-green':'b-orange'}">${w.status==='done'?'実行済み':'未実行'}</span></div></div>`;
  el.innerHTML=`<div class="chart-row"><div class="chart-box"><div class="chart-lbl">実行率</div><div class="pie-wrap"><canvas id="pie1"></canvas><div class="pie-center"><div class="pie-num">${total?Math.round(doneAll/total*100):0}</div><div class="pie-unit">%</div></div></div><div class="chart-sub">${doneAll} / ${total} 件</div></div><div class="chart-box"><div class="chart-lbl">登録数の割合</div><div class="pie-wrap"><canvas id="pie2"></canvas><div class="pie-center"><div class="pie-num" style="font-size:11px;color:var(--sub)">${iconHTML(U.icon,12)}:${aCount}<br>${iconHTML(P.icon,12)}:${bCount}</div></div></div><div class="chart-sub">全 ${total} 件</div></div></div><div class="sec-lbl">未実行 (${pending.length})</div><div class="c-list">${pending.length?pending.map(row).join(''):'<div class="empty-row">データなし</div>'}</div><div class="sec-lbl">実行済み (${done.length})</div><div class="c-list">${done.length?done.map(row).join(''):'<div class="empty-row">データなし</div>'}</div><div style="height:6px"></div>`;
  drawPie('pie1',[doneAll,total-doneAll],['#34c759','#e5e5ea']);
  drawPie('pie2',[aCount,bCount],[U.theme,P.theme]);
}

function drawPie(id,data,colors){
  const c=document.getElementById(id);if(!c)return;
  c.width=76;c.height=76;const ctx=c.getContext('2d');
  const total=data.reduce((s,v)=>s+v,0)||1;let angle=-Math.PI/2;
  data.forEach((v,i)=>{const sl=(v/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(38,38);ctx.arc(38,38,35,angle,angle+sl);ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();angle+=sl});
  ctx.beginPath();ctx.arc(38,38,20,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function clearPlusList(id){document.getElementById(id).innerHTML=''}
function addPlusInput(listId,type,val=''){
  const row=document.createElement('div');row.className='plus-row';
  row.innerHTML=`<input class="plus-input" type="${type==='url'?'url':'text'}" value="${esc(val)}" placeholder="${type==='url'?'https://...':'値を入力'}"><button class="mini-del" type="button">−</button>`;
  row.querySelector('.mini-del').onclick=()=>row.remove();
  document.getElementById(listId).appendChild(row);
}
function collectPlusValues(listId){
  return Array.from(document.querySelectorAll(`#${listId} .plus-input`)).map(i=>i.value.trim()).filter(Boolean);
}

function tagCandidates(){
  try{return [...new Set([...(JSON.parse(localStorage.getItem(TAG_STORE))||[]),...defaultTags])]}catch{return defaultTags}
}
function saveTags(tags){
  const merged=[...new Set([...(tagCandidates()),...tags.filter(Boolean)])];
  localStorage.setItem(TAG_STORE,JSON.stringify(merged));
}
function addTagInput(listId,val=''){
  const row=document.createElement('div');row.className='plus-row';
  row.innerHTML=`<div style="flex:1"><input class="plus-input" type="text" value="${esc(val)}" placeholder="タグ入力"><div class="tag-drop hidden"></div></div><button class="mini-del" type="button">−</button>`;
  const input=row.querySelector('.plus-input'),drop=row.querySelector('.tag-drop');
  const refresh=()=>{
    const q=input.value.trim().toLowerCase();
    const cands=tagCandidates().filter(t=>t.toLowerCase().includes(q)).slice(0,6);
    if(!q||!cands.length){drop.classList.add('hidden');drop.innerHTML='';return}
    drop.classList.remove('hidden');
    drop.innerHTML=cands.map(t=>`<div class='tag-option'>${esc(t)}</div>`).join('');
    drop.querySelectorAll('.tag-option').forEach(opt=>opt.onclick=()=>{input.value=opt.textContent;drop.classList.add('hidden')});
  };
  input.addEventListener('input',refresh);
  input.addEventListener('focus',refresh);
  input.addEventListener('blur',()=>setTimeout(()=>drop.classList.add('hidden'),120));
  row.querySelector('.mini-del').onclick=()=>row.remove();
  document.getElementById(listId).appendChild(row);
}

function previewImage(inputId,imgId){
  const url=document.getElementById(inputId).value.trim();
  const img=document.getElementById(imgId);
  if(!url){img.style.display='none';img.src='';return}
  img.src=url;img.style.display='block';
  img.onerror=()=>{img.style.display='none'};
}

let addUsePeriod=false;
function toggleAddPeriod(){
  addUsePeriod=!addUsePeriod;
  document.getElementById('f-period-row').classList.toggle('hidden',!addUsePeriod);
}
let editUsePeriod=false;
function toggleEditPeriod(){
  editUsePeriod=!editUsePeriod;
  document.getElementById('e-period-row').classList.toggle('hidden',!editUsePeriod);
}

function openAdd(){
  document.getElementById('f-title').value='';
  document.getElementById('f-event-day').value=todayStr();
  document.getElementById('f-period-start').value='';
  document.getElementById('f-period-end').value='';
  document.getElementById('f-map').value='';
  document.getElementById('f-image').value='';
  previewImage('f-image','f-image-preview');
  document.getElementById('f-memo').value='';
  document.getElementById('f-donedate').value=todayStr();
  document.getElementById('f-meter-a').value=3;
  document.getElementById('f-meter-b').value=3;
  clearPlusList('f-url-list');addPlusInput('f-url-list','url');
  clearPlusList('f-tag-list');addTagInput('f-tag-list');
  addUsePeriod=false;document.getElementById('f-period-row').classList.add('hidden');
  document.getElementById('addRegLabel').innerHTML=iconHTML(U.icon,14)+' '+U.name;
  setAddStatus('pending');openM('addModal');
}
function setAddStatus(s){
  fStatus=s;
  document.getElementById('t-pending').className='tgl '+(s==='pending'?'tgl-orange':'tgl-off');
  document.getElementById('t-done').className='tgl '+(s==='done'?'tgl-green':'tgl-off');
  document.getElementById('doneDateRow').style.display=s==='done'?'flex':'none';
}

function buildEvent(type,prefix){
  if(type==='single')return {eventType:'single',eventDate:document.getElementById(`${prefix}-event-day`).value||'',period:''};
  const period=buildPeriod(document.getElementById(`${prefix}-period-start`).value,document.getElementById(`${prefix}-period-end`).value);
  if(period===null)return null;
  return {eventType:'period',eventDate:'',period};
}

function submitAdd(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('やりたいことを入力してください');return}
  const ev=buildEvent(addUsePeriod?'period':'single','f');if(!ev)return;
  const tags=collectPlusValues('f-tag-list');
  const urls=collectPlusValues('f-url-list');
  saveTags(tags);
  items.push({
    id:uid(),title,regDate:todayStr(),createdAt:new Date().toISOString(),
    ...ev,
    urls,mapUrl:document.getElementById('f-map').value.trim(),imageUrl:document.getElementById('f-image').value.trim(),
    memo:document.getElementById('f-memo').value.trim(),registrar:U.id,status:fStatus,
    doneDate:fStatus==='done'?(document.getElementById('f-donedate').value||todayStr()):null,
    tags,meter:{[U.id]:Number(document.getElementById('f-meter-a').value),[P.id]:Number(document.getElementById('f-meter-b').value)}
  });
  persist();closeM('addModal');render();
}

function renderLinks(urls){
  return (urls||[]).map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`).join('<br>')||'—';
}

function openDetail(id){
  const w=items.find(x=>x.id===id);if(!w)return;
  editingId=id;
  const tags=(w.tags||[]).length?(w.tags||[]).map(t=>`<span class='tag-chip'>${esc(t)}</span>`).join(' '):'—';
  const eventText=w.eventType==='period'?(w.period||'—'):(w.eventDate?fmtDay(w.eventDate):'—');
  const img=w.imageUrl?`<div class="det-row"><span class="det-k">画像</span><span class="det-v"><a href="${esc(w.imageUrl)}" target="_blank" rel="noopener">画像を開く</a></span></div>`:'';
  document.getElementById('detBody').innerHTML=`
    <div class="det-title">${esc(w.title)}</div>
    <div class="det-row"><span class="det-k">ステータス</span><span class="det-v">${w.status==='done'?'✅ 実行済み':'⏳ 未実行'}</span></div>
    <div class="det-row"><span class="det-k">登録者</span><span class="det-v">${accountIcon(w.registrar)} ${accountName(w.registrar)}</span></div>
    <div class="det-row"><span class="det-k">登録日時</span><span class="det-v">${formatDateTime(w.createdAt)}</span></div>
    <div class="det-row"><span class="det-k">イベント日付/期間</span><span class="det-v">${eventText}</span></div>
    ${w.doneDate?`<div class="det-row"><span class="det-k">実行日</span><span class="det-v">${fmtDay(w.doneDate)}</span></div>`:''}
    <div class="det-row"><span class="det-k">マップ</span><span class="det-v">${w.mapUrl?`<a href="${esc(w.mapUrl)}" target="_blank" rel="noopener">${esc(w.mapUrl)}</a>`:'—'}</span></div>
    <div class="det-row"><span class="det-k">URL</span><span class="det-v">${renderLinks(w.urls)}</span></div>
    ${img}
    <div class="det-row"><span class="det-k">タグ</span><span class="det-v">${tags}</span></div>
    <div class="det-row"><span class="det-k">やりたい度</span><span class="det-v">${esc(U.name)}:${w.meter?.[U.id]||3}/5<br>${esc(P.name)}:${w.meter?.[P.id]||3}/5</span></div>
    <div class="det-row"><span class="det-k">メモ</span><span class="det-v">${esc(w.memo)||'—'}</span></div>`;
  const toggleBtn=document.getElementById('toggleBtn');
  if(w.status==='done'){
    toggleBtn.textContent='↩ 未実行に戻す';toggleBtn.className='ok-btn orange';
    toggleBtn.onclick=()=>{w.status='pending';w.doneDate=null;persist();closeM('detModal');render()};
  }else{
    toggleBtn.textContent='✅ 実行済みにする';toggleBtn.className='ok-btn green';
    toggleBtn.onclick=()=>{w.status='done';w.doneDate=todayStr();persist();closeM('detModal');render()};
  }
  document.getElementById('delBtn').onclick=()=>{if(!confirm('削除しますか？'))return;items=items.filter(x=>x.id!==id);persist();closeM('detModal');render()};
  openM('detModal');
}

function openEdit(){
  const w=items.find(x=>x.id===editingId);if(!w)return;
  document.getElementById('e-title').value=w.title||'';
  document.getElementById('e-event-day').value=w.eventDate||todayStr();
  const [s,e]=parsePeriod(w.period||'');
  document.getElementById('e-period-start').value=s;
  document.getElementById('e-period-end').value=e;
  editUsePeriod=w.eventType==='period';
  document.getElementById('e-period-row').classList.toggle('hidden',!editUsePeriod);
  document.getElementById('e-map').value=w.mapUrl||'';
  document.getElementById('e-image').value=w.imageUrl||'';
  previewImage('e-image','e-image-preview');
  document.getElementById('e-memo').value=w.memo||'';
  document.getElementById('e-donedate').value=w.doneDate||todayStr();
  document.getElementById('e-doneDateRow').style.display=w.status==='done'?'flex':'none';
  document.getElementById('e-meter-a').value=w.meter?.[U.id]||3;
  document.getElementById('e-meter-b').value=w.meter?.[P.id]||3;

  clearPlusList('e-url-list');
  (w.urls?.length?w.urls:['']).forEach(v=>addPlusInput('e-url-list','url',v));
  clearPlusList('e-tag-list');
  ((w.tags&&w.tags.length)?w.tags:['']).forEach(v=>addTagInput('e-tag-list',v));
  closeM('detModal');openM('editModal');
}
function submitEdit(){
  const w=items.find(x=>x.id===editingId);if(!w)return;
  const title=document.getElementById('e-title').value.trim();
  if(!title){alert('やりたいことを入力してください');return}
  const ev=buildEvent(editUsePeriod?'period':'single','e');if(!ev)return;
  const tags=collectPlusValues('e-tag-list');
  const urls=collectPlusValues('e-url-list');
  saveTags(tags);

  w.title=title;
  Object.assign(w,ev);
  w.urls=urls;
  w.mapUrl=document.getElementById('e-map').value.trim();
  w.imageUrl=document.getElementById('e-image').value.trim();
  w.memo=document.getElementById('e-memo').value.trim();
  w.tags=tags;
  w.meter={[U.id]:Number(document.getElementById('e-meter-a').value),[P.id]:Number(document.getElementById('e-meter-b').value)};
  if(w.status==='done')w.doneDate=document.getElementById('e-donedate').value||w.doneDate;
  persist();closeM('editModal');render();
}

function openFilter(){applyFilterUI();openM('filterModal')}
function applyFilterUI(){
  const fs=filterStatus,fr=filterReg,sk=sortKey,fm=filterMap;
  document.getElementById('fil-all').className='tgl '+(fs==='all'?'tgl-accent':'tgl-off');
  document.getElementById('fil-pending').className='tgl '+(fs==='pending'?'tgl-orange':'tgl-off');
  document.getElementById('fil-done').className='tgl '+(fs==='done'?'tgl-green':'tgl-off');

  document.getElementById('fil-map-all').className='tgl '+(fm==='all'?'tgl-accent':'tgl-off');
  document.getElementById('fil-map-has').className='tgl '+(fm==='has'?'tgl-accent':'tgl-off');
  document.getElementById('fil-map-none').className='tgl '+(fm==='none'?'tgl-accent':'tgl-off');

  document.getElementById('fil-reg-btns').innerHTML=`
    <button class="tgl ${fr==='all'?'tgl-accent':'tgl-off'}" onclick="setRegFilter('all')">全て</button>
    <button class="tgl ${fr===U.id?'tgl-accent':'tgl-off'}" onclick="setRegFilter('${U.id}')">${iconHTML(U.icon,14)} ${U.name}</button>
    <button class="tgl ${fr===P.id?'tgl-accent':'tgl-off'}" onclick="setRegFilter('${P.id}')">${iconHTML(P.icon,14)} ${P.name}</button>`;

  clearPlusList('fil-tag-list');
  if(filterTags.length){
    filterTags.forEach(t=>addTagInput('fil-tag-list',t));
  } else {
    addTagInput('fil-tag-list');
  }

  document.getElementById('sort-reg').className='tgl '+(sk==='reg'?'tgl-accent':'tgl-off');
  document.getElementById('sort-done').className='tgl '+(sk==='done'?'tgl-accent':'tgl-off');
}
function setFilter(v){filterStatus=v;applyFilterUI()}
function setMapFilter(v){filterMap=v;applyFilterUI()}
function setRegFilter(v){filterReg=v;applyFilterUI()}
function setSort(v){sortKey=v;applyFilterUI()}

init();
</script>
