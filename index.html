<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ホーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#6b7280;--muted:#aeaeb2;--border:rgba(0,0,0,0.07);--accent:#7c7aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;--blue:#007aff;--r:14px;--nav:62px}
html,body{height:100%;background:#c9c9ce;display:flex;justify-content:center;align-items:center;font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.phone{width:min(390px,100vw);height:min(844px,100dvh);background:var(--bg);border-radius:clamp(0px,calc((100vw - 390px)*-99),48px);overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 40px 80px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.09)}
.hdr{padding:max(52px,env(safe-area-inset-top,52px)) 20px 12px;background:var(--bg);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.hdr-greeting{font-size:13px;color:var(--sub);font-weight:400;margin-bottom:2px}
.hdr-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.hdr-date{font-size:12px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;align-items:flex-end;gap:8px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card);border-radius:20px;padding:6px 12px 6px 6px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:background .15s}
.user-chip:active{background:#e5e5ea}
.user-chip-icon{font-size:20px}
.user-chip-name{font-size:12px;font-weight:600;color:var(--text)}
.refresh-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--sub);box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .3s,background .15s;flex-shrink:0}
.refresh-btn:active{background:#e5e5ea}
.refresh-btn.spin{animation:spin .5s ease}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.scroll{flex:1;overflow-y:auto;padding:10px 14px 20px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}
.sec-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.07em;text-transform:uppercase;padding:16px 2px 8px}
.hero-card{border-radius:20px;padding:22px 20px;margin-bottom:10px;background:linear-gradient(135deg,var(--accent) 0%,#a78bfa 100%);color:#fff;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-tag{font-size:11px;font-weight:700;opacity:.8;letter-spacing:.06em;margin-bottom:8px}
.hero-amount{font-size:36px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-.5px}
.hero-desc{font-size:13px;opacity:.88;line-height:1.5}
.hero-sub-row{display:flex;gap:8px;margin-top:14px}
.hero-sub-item{flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:10px 12px}
.hero-sub-label{font-size:10px;opacity:.75;font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.hero-sub-val{font-size:16px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-card{background:var(--card);border-radius:var(--r);padding:16px 14px}
.stat-icon{font-size:22px;margin-bottom:8px;display:block}
.stat-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.stat-bar-wrap{margin-top:8px;height:4px;background:#f0f0f5;border-radius:2px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.notice-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
.notice-card:active{background:#f5f5fa}
.notice-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.nd-red{background:var(--red)}.nd-orange{background:var(--orange)}.nd-blue{background:var(--blue)}.nd-green{background:var(--green)}.nd-purple{background:var(--accent)}
.notice-body{flex:1;min-width:0}
.notice-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.5}
.notice-sub{font-size:12px;color:var(--sub);margin-top:2px}
.event-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.event-days{width:44px;height:44px;border-radius:12px;background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.event-days-num{font-size:18px;font-weight:700;line-height:1}
.event-days-lbl{font-size:9px;font-weight:600;opacity:.85}
.event-days.expired{background:#e5e5ea;color:var(--muted)}
.event-days.today{background:var(--pink)}
.event-body{flex:1;min-width:0}
.event-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-period{font-size:12px;color:var(--sub);margin-top:2px}
.empty-small{padding:20px;text-align:center;font-size:13px;color:var(--muted);background:var(--card);border-radius:var(--r)}
.nav{height:calc(var(--nav) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(250,250,250,.96);border-top:.5px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0;backdrop-filter:blur(20px);z-index:30}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:10px 0 6px;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.nav-item:active{transform:scale(.88)}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--accent);font-weight:700}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-anim{animation:fadeInUp .25s ease both}
.section-anim:nth-child(2){animation-delay:.05s}
.section-anim:nth-child(3){animation-delay:.1s}
.section-anim:nth-child(4){animation-delay:.15s}
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div>
      <div class="hdr-greeting" id="greeting"></div>
      <div class="hdr-title">ふたりのアプリ 💑</div>
      <div class="hdr-date" id="todayDate"></div>
    </div>
    <div class="hdr-right">
      <div class="user-chip" id="userChip" onclick="location.href='mypage.html'">
        <span class="user-chip-icon" id="userIcon"></span>
        <span class="user-chip-name" id="userName"></span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">🔄</button>
    </div>
  </div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav"></nav>
</div>
<script src="auth.js"></script>
<script>
function yen(n){return'¥'+Number(n).toLocaleString()}
function todayStr(){return new Date().toISOString().slice(0,10)}
function loadPayments(){try{const d=JSON.parse(localStorage.getItem('pay_v1'));return Array.isArray(d)?d:[]}catch{return[]}}
function loadWants(){try{const d=JSON.parse(localStorage.getItem('wants_v1'));return Array.isArray(d)?d:[]}catch{return[]}}
function loadStamp(){
  const u=currentUser();
  const key='stamp_v1_'+u.id;
  try{const d=JSON.parse(localStorage.getItem(key));return(d&&Array.isArray(d.cards))?d:{cards:[{cells:Array(30).fill(false),stampDates:Array(30).fill(null),completed:false,goal:'毎日の目標',startDate:new Date().toISOString()}]}}catch{return{cards:[{cells:Array(30).fill(false),stampDates:Array(30).fill(null),completed:false,goal:'毎日の目標',startDate:new Date().toISOString()}]}}
}

function init(){
  if(!requireLogin())return;
  const u=currentUser();
  applyTheme(u.theme);
  document.getElementById('userIcon').textContent=u.icon;
  document.getElementById('userName').textContent=u.name;
  document.getElementById('nav').innerHTML=navHTML('home');
  renderHeader();render();
  setInterval(()=>{renderHeader();render()},60000);
}

function renderHeader(){
  const h=new Date().getHours();
  const u=currentUser();
  document.getElementById('greeting').textContent=(h<5?'おやすみなさい 🌙':h<12?'おはようございます ☀️':h<17?'こんにちは 🌤':'こんばんは 🌙')+' '+u.name+'さん';
  const d=new Date(),w=['日','月','火','水','木','金','土'];
  document.getElementById('todayDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;
}

function doRefresh(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spin');setTimeout(()=>btn.classList.remove('spin'),500);
  renderHeader();render();
}

function render(){
  const pays=loadPayments(),wants=loadWants(),stamp=loadStamp();
  const u=currentUser(),p=getAccount(partnerId());
  const myId=u.id,pId=p.id;
  const unMe=pays.filter(x=>x.who===myId&&x.status==='unpaid').reduce((s,x)=>s+x.amount,0);
  const unPt=pays.filter(x=>x.who===pId&&x.status==='unpaid').reduce((s,x)=>s+x.amount,0);
  const diff=unPt-unMe,diffAbs=Math.abs(diff);
  const diffDesc=diff>0?`${p.name}が ${yen(diffAbs)} 多く払うべき状態`:diff<0?`${u.name}が ${yen(diffAbs)} 多く払うべき状態`:'お互いの支払いは釣り合っています ✨';
  const wTotal=wants.length,wDone=wants.filter(w=>w.status==='done').length,wPending=wants.filter(w=>w.status==='pending').length,wPct=wTotal?Math.round(wDone/wTotal*100):0;
  const lc=stamp.cards[stamp.cards.length-1];
  const sStamped=lc?lc.cells.filter(Boolean).length:0;
  const sTodayDone=lc?lc.stampDates.some(d=>d&&d.startsWith(todayStr())):false;
  const sComp=lc?.completed||false,sPct=Math.round(sStamped/30*100);
  const notices=buildNotices(pays,wants,lc,sTodayDone,sComp,u,p);
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=wants.filter(w=>w.status==='pending'&&w.period).map(w=>{const e=parseEnd(w.period);return e?{...w,e,days:Math.ceil((e-today)/86400000)}:null}).filter(Boolean).sort((a,b)=>a.days-b.days).slice(0,4);

  document.getElementById('scroll').innerHTML=`
    <div class="hero-card section-anim">
      <div class="hero-tag">💰 支払い差額サマリー</div>
      <div class="hero-amount">${yen(diffAbs)}</div>
      <div class="hero-desc">${diffDesc}</div>
      <div class="hero-sub-row">
        <div class="hero-sub-item"><div class="hero-sub-label">${u.icon} ${u.name}の未払い</div><div class="hero-sub-val">${yen(unMe)}</div></div>
        <div class="hero-sub-item"><div class="hero-sub-label">${p.icon} ${p.name}の未払い</div><div class="hero-sub-val">${yen(unPt)}</div></div>
      </div>
    </div>
    <div class="grid2 section-anim">
      <div class="stat-card"><span class="stat-icon">📋</span><div class="stat-label">やりたいこと</div><div class="stat-value">${wPending}<span style="font-size:13px;font-weight:400;color:var(--sub)"> 件</span></div><div class="stat-sub">実行済み ${wDone} / 全 ${wTotal} 件</div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${wPct}%;background:linear-gradient(90deg,var(--green),#86efac)"></div></div></div>
      <div class="stat-card"><span class="stat-icon">🔖</span><div class="stat-label">スタンプカード</div><div class="stat-value">${sStamped}<span style="font-size:13px;font-weight:400;color:var(--sub)"> / 30</span></div><div class="stat-sub">${sComp?'✨ コンプリート済み':sTodayDone?'✅ 今日は押した':'⏳ 今日未スタンプ'}</div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${sPct}%;background:linear-gradient(90deg,var(--pink),#fb923c)"></div></div></div>
    </div>
    ${notices.length?`<div class="sec-lbl section-anim">🔔 お知らせ (${notices.length})</div><div class="section-anim">${notices.map(n=>`<div class="notice-card" onclick="goTo('${n.screen||'home'}')"><div class="notice-dot ${n.dot}"></div><div class="notice-body"><div class="notice-title">${n.title}</div>${n.sub?`<div class="notice-sub">${n.sub}</div>`:''}</div></div>`).join('')}</div>`:''}
    <div class="sec-lbl section-anim">📅 期限が近いやりたいこと</div>
    <div class="section-anim">${upcoming.length?upcoming.map(w=>{let c='event-days';if(w.days<0)c+=' expired';else if(w.days===0)c+=' today';return`<div class="event-card"><div class="${c}"><div class="event-days-num">${w.days<=0?'—':w.days}</div><div class="event-days-lbl">${w.days>0?'日後':w.days===0?'今日':'終了'}</div></div><div class="event-body"><div class="event-title">${w.title}</div><div class="event-period">${w.period}</div></div></div>`}).join(''):'<div class="empty-small">期限付きの予定はありません</div>'}</div>
    <div style="height:6px"></div>`;
}

function buildNotices(pays,wants,lc,sTodayDone,sComp,u,p){
  const notices=[],today=new Date();today.setHours(0,0,0,0);
  const unMe=pays.filter(x=>x.who===u.id&&x.status==='unpaid').reduce((s,x)=>s+x.amount,0);
  const unPt=pays.filter(x=>x.who===p.id&&x.status==='unpaid').reduce((s,x)=>s+x.amount,0);
  if(unMe>0)notices.push({dot:'nd-red',title:`${u.name}の未払いが ${yen(unMe)} あります`,sub:'支払い管理から確認できます',screen:'pay'});
  if(unPt>0)notices.push({dot:'nd-orange',title:`${p.name}の未払いが ${yen(unPt)} あります`,sub:'支払い管理から確認できます',screen:'pay'});
  if(!sComp&&!sTodayDone&&lc){const r=30-lc.cells.filter(Boolean).length;notices.push({dot:'nd-purple',title:'今日のスタンプがまだ押せます',sub:`残り ${r} マス`,screen:'stamp'})}
  wants.filter(w=>w.status==='pending'&&w.period).forEach(w=>{const e=parseEnd(w.period);if(!e)return;const days=Math.ceil((e-today)/86400000);if(days>=0&&days<=3)notices.push({dot:days===0?'nd-red':'nd-blue',title:`「${w.title}」の期限まであと ${days===0?'今日！':days+'日'}`,sub:w.period,screen:'wants'})});
  return notices;
}
function parseEnd(period){if(!period)return null;const m=period.match(/(\d{4}\/\d{1,2}\/\d{1,2})/g);if(!m||m.length<2)return null;const d=new Date(m[1].replace(/\//g,'-'));return isNaN(d)?null:d}
function goTo(s){const m={pay:'01_payment.html',wants:'02_wants.html',stamp:'03_stamp.html',bingo:'04_bingo.html',mypage:'mypage.html'};if(m[s])location.href=m[s]}

init();
</script>
</body>
</html>
